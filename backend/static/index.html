                      <p style={{fontSize:'.78rem',color:'var(--text-secondary)',marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.venue} &middot; {e.city}</p>
                      <span className="badge badge-accent" style={{fontSize:'.72rem',padding:'3px 10px'}}>{e.type}</span>
                    </div>
                  </div>
                </div>
              );
            })}</CarouselWithNav>
          </RevealSection>
        )}
      </div>
    </div>
  );
}

function MoviesPage({ navigate }) {
  const { t } = useLang();
  const [movies, setMovies] = useState([]);
  const [genres, setGenres] = useState([]);
  const [activeGenre, setActiveGenre] = useState(null);
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(true);
  const [loadingMore, setLoadingMore] = useState(false);
  const [page, setPage] = useState(1);
  const [hasMore, setHasMore] = useState(true);

  useEffect(() => { api.get('/api/movies/genres').then(setGenres).catch(()=>{}); }, []);
  useEffect(() => {
    setLoading(true); setPage(1); setHasMore(true);
    const route = window.location.hash.slice(1) || `${window.location.pathname}${window.location.search}`;
    const qMatch = route.match(/[?&]q=([^&]*)/);
    if (qMatch) { const q = decodeURIComponent(qMatch[1]); setQuery(q); api.get('/api/movies/search?q='+encodeURIComponent(q)).then(d=>{setMovies(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); }
    else if (activeGenre) { api.get('/api/movies/discover?genre='+activeGenre).then(d=>{setMovies(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); }
    else { api.get('/api/movies/trending').then(d=>{setMovies(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); }
  }, [activeGenre]);

  const handleSearch = (e) => { e.preventDefault(); if(query.trim()) { setLoading(true); setActiveGenre(null); setPage(1); setHasMore(true); api.get('/api/movies/search?q='+encodeURIComponent(query)).then(d=>{setMovies(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); }};

  const loadMore = () => {
    const nextPage = page + 1;
    setLoadingMore(true);
    let url;
    if (query.trim()) url = '/api/movies/search?q='+encodeURIComponent(query)+'&page='+nextPage;
    else if (activeGenre) url = '/api/movies/discover?genre='+activeGenre+'&page='+nextPage;
    else url = '/api/movies/trending?page='+nextPage;
    api.get(url).then(d => { setMovies(prev=>[...prev,...d]); setPage(nextPage); if(d.length<40) setHasMore(false); }).finally(()=>setLoadingMore(false));
  };

  return (
    <div className="container fade-in" style={{paddingTop:20}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-film-line"></i><h1>{t('movies')}</h1></div><p>{t('discoverMovies')}</p></div>
      <form onSubmit={handleSearch} className="search-bar">
        <input className="input" placeholder={t('searchMovies')} value={query} onChange={e=>setQuery(e.target.value)} />
        <button type="submit" className="btn btn-primary btn-ripple"><i className="ri-search-line"></i> {t('search')}</button>
      </form>
      <div className="tabs">
        <button className={`tab ${!activeGenre?'active':''}`} onClick={()=>{setActiveGenre(null);setQuery('')}}>{t('trending')}</button>
        {genres.slice(0,12).map(g => <button key={g.id} className={`tab ${activeGenre===g.id?'active':''}`} onClick={()=>{setActiveGenre(g.id);setQuery('')}}>{g.name}</button>)}
      </div>
      {!loading && movies.length > 0 && (
        <div className="results-info"><span className="results-count"><strong>{movies.length}</strong> {t('resultsFound')}</span></div>
      )}
      {loading ? <SkeletonCard count={10} />
        : movies.length===0 ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-film-line" style={{fontSize:'3rem'}}></i></div><h3>{t('noMovies')}</h3></div>
        : <>
          <div className="grid">{movies.map((m,i) => <RevealSection key={m.id+'-'+i} delay={Math.min(i,12)*50}><Card type="movie" image={m.poster_url} title={m.title} subtitle={m.release_date?.slice(0,4)} rating={m.vote_average} onClick={()=>navigate('/movies/'+m.id)} /></RevealSection>)}</div>
          {hasMore && <div className="load-more-wrap"><button className="btn-load-more" onClick={loadMore} disabled={loadingMore}>{loadingMore ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> {t('loading')}</> : <><i className="ri-arrow-down-line"></i> {t('loadMore')}</>}</button></div>}
        </>}
    </div>
  );
}

function BooksPage({ navigate }) {
  const { t } = useLang();
  const subjects = ['Fiction','Science Fiction','Fantasy','Mystery','Romance','History','Science','Philosophy','Classic','Adventure'];
  const [books, setBooks] = useState([]);
  const [activeSub, setActiveSub] = useState(null);
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(true);
  const [loadingMore, setLoadingMore] = useState(false);
  const [hasMore, setHasMore] = useState(false);

  useEffect(() => { api.get('/api/books/trending').then(d=>{setBooks(d);setHasMore(false)}).finally(()=>setLoading(false)); }, []);
  const handleSearch = (e) => { e.preventDefault(); if(query.trim()) { setLoading(true); setActiveSub(null); api.get('/api/books/search?q='+encodeURIComponent(query)).then(d=>{setBooks(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); }};
  const handleSub = (s) => { setActiveSub(s); setQuery(''); setLoading(true); api.get('/api/books/subjects/'+s.toLowerCase()).then(d=>{setBooks(d);setHasMore(d.length>=40)}).finally(()=>setLoading(false)); };

  const loadMore = () => {
    setLoadingMore(true);
    const start = books.length;
    let url;
    if (query.trim()) url = '/api/books/search?q='+encodeURIComponent(query)+'&start='+start;
    else if (activeSub) url = '/api/books/subjects/'+activeSub.toLowerCase()+'?start='+start;
    else { setLoadingMore(false); return; }
    api.get(url).then(d => { setBooks(prev=>[...prev,...d]); if(d.length<40) setHasMore(false); }).finally(()=>setLoadingMore(false));
  };

  return (
    <div className="container fade-in" style={{paddingTop:20}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-book-2-line"></i><h1>{t('books')}</h1></div><p>{t('discoverBooks')}</p></div>
      <form onSubmit={handleSearch} className="search-bar">
        <input className="input" placeholder={t('searchBooks')} value={query} onChange={e=>setQuery(e.target.value)} />
        <button type="submit" className="btn btn-primary btn-ripple"><i className="ri-search-line"></i> {t('search')}</button>
      </form>
      <div className="tabs">
        <button className={`tab ${!activeSub?'active':''}`} onClick={()=>{setActiveSub(null);setQuery('');setLoading(true);setHasMore(false);api.get('/api/books/trending').then(setBooks).finally(()=>setLoading(false))}}>{t('trending')}</button>
        {subjects.map(s => <button key={s} className={`tab ${activeSub===s?'active':''}`} onClick={()=>handleSub(s)}>{s}</button>)}
      </div>
      {!loading && books.length > 0 && (
        <div className="results-info"><span className="results-count"><strong>{books.length}</strong> {t('resultsFound')}</span></div>
      )}
      {loading ? <SkeletonCard count={10} />
        : books.length===0 ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-book-2-line" style={{fontSize:'3rem'}}></i></div><h3>{t('noBooks')}</h3></div>
        : <>
          <div className="grid">{books.map((b,i) => <RevealSection key={(b.key||'')+'-'+i} delay={Math.min(i,12)*50}><Card type="book" image={b.cover_url} title={b.title} subtitle={b.authors?.join(', ')} rating={b.rating} onClick={()=>navigate('/books/'+encodeURIComponent(b.key))} /></RevealSection>)}</div>
          {hasMore && <div className="load-more-wrap"><button className="btn-load-more" onClick={loadMore} disabled={loadingMore}>{loadingMore ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> {t('loading')}</> : <><i className="ri-arrow-down-line"></i> {t('loadMore')}</>}</button></div>}
        </>}
    </div>
  );
}

function MusicPage() {
  const { t } = useLang();
  const { tracks, setTracks, playing, isPlaying, playTrack } = useMusicPlayer() || {};
  const [genres, setGenres] = useState([]);
  const [activeGenre, setActiveGenre] = useState(null);
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([
      api.get('/api/music/chart').then(setTracks),
      api.get('/api/music/genres').then(setGenres),
    ]).catch(()=>{}).finally(()=>setLoading(false));
  }, []);

  const handleFilter = (g) => {
    setActiveGenre(g);
    setLoading(true);
    if (g) { api.get(`/api/music/genre/${g.id}/tracks`).then(setTracks).finally(()=>setLoading(false)); }
    else { api.get('/api/music/chart').then(setTracks).finally(()=>setLoading(false)); }
  };
  const handleSearch = (e) => {
    e.preventDefault();
    if (query.trim()) { setLoading(true); api.get('/api/music/search?q='+encodeURIComponent(query)).then(setTracks).finally(()=>setLoading(false)); }
  };

  const fmtTime = (s) => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60); return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`; };

  return (
    <div className="container fade-in" style={{paddingTop:20, paddingBottom: playing?100:0}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-music-2-line"></i><h1>{t('music')}</h1></div><p>{t('discoverMusic')}</p></div>
      <form onSubmit={handleSearch} className="search-bar">
        <input className="input" placeholder={t('searchMusic')} value={query} onChange={e=>setQuery(e.target.value)} />
        <button type="submit" className="btn btn-primary btn-ripple"><i className="ri-search-line"></i> {t('search')}</button>
      </form>
      <div className="tabs" style={{marginTop:16}}>
        <button className={`tab ${!activeGenre?'active':''}`} onClick={()=>handleFilter(null)}>{t('all')}</button>
        {genres.slice(0,12).map(g => <button key={g.id} className={`tab ${activeGenre&&activeGenre.id===g.id?'active':''}`} onClick={()=>handleFilter(g)}>{g.name}</button>)}
      </div>
      {!loading && tracks.length > 0 && (
        <div className="results-info"><span className="results-count"><strong>{tracks.length}</strong> {t('tracks')}</span></div>
      )}
      {loading ? <SkeletonList count={10} />
        : tracks.length===0 ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-music-2-line" style={{fontSize:'3rem'}}></i></div><h3>{t('noTracks')}</h3></div>
        : <div className="track-list">{tracks.map((tr,i) => (
          <div key={tr.id} className={`track-row ${playing===tr.id?'track-playing':''}`} onClick={()=>playTrack(tr)} style={{animationDelay:`${i*0.02}s`}}>
            <span className="track-num">{playing===tr.id && isPlaying ? <Equalizer /> : i+1}</span>
            <div className="track-cover-sm">
              {tr.cover ? <img src={tr.cover} alt="" /> : <div className="music-icon"><i className="ri-music-2-fill"></i></div>}
            </div>
            <div className="track-info"><span className="track-title">{tr.title}</span><span className="track-artist">{tr.artist}</span></div>
            <span className="track-album">{tr.album}</span>
            <span className="track-duration">{fmtTime(tr.duration)}</span>
            <div className="track-play-hover">{playing===tr.id && isPlaying ? <i className="ri-pause-fill"></i> : <i className="ri-play-fill"></i>}</div>
          </div>
        ))}</div>}
    </div>
  );
}

function EventsPage() {
  const { t, lang } = useLang();
  const [events, setEvents] = useState([]);
  const [categories, setCategories] = useState([]);
  const [cities, setCities] = useState([]);
  const [activeCat, setActiveCat] = useState('');
  const [activeCity, setActiveCity] = useState('');
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(true);
  const [searchMode, setSearchMode] = useState(false);

  useEffect(() => {
    Promise.all([
      api.get('/api/events/categories').then(setCategories),
      api.get('/api/events/cities').then(setCities),
    ]).catch(()=>{});
    loadEvents();
  }, []);

  const loadEvents = (cat, city) => {
    setLoading(true); setSearchMode(false);
    const p = new URLSearchParams();
    if (cat) p.set('category', cat);
    if (city) p.set('city', city);
    api.get('/api/events/browse?' + p).then(setEvents).catch(()=>{}).finally(()=>setLoading(false));
  };

  const handleCat = (cat) => { setActiveCat(cat); loadEvents(cat, activeCity); };
  const handleCity = (city) => { setActiveCity(city); loadEvents(activeCat, city); };
  const handleSearch = (e) => { e.preventDefault(); if(query.trim()) { setLoading(true); setSearchMode(true);
    const p = new URLSearchParams({ q: query.trim() });
    if (activeCity) p.set('city', activeCity);
    api.get('/api/events/search?' + p).then(setEvents).finally(()=>setLoading(false)); }};
  const clearSearch = () => { setQuery(''); setSearchMode(false); loadEvents(activeCat, activeCity); };

  const monthNames = lang === 'ru' ? ['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'] : ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const catIcons = {concert:'ri-music-2-line',theatre:'ri-drama-line',standup:'ri-mic-line',sport:'ri-boxing-line',art:'ri-palette-line',entertainment:'ri-gamepad-line',family:'ri-parent-line',tours:'ri-compass-3-line',bowling:'ri-bowling-line',billiards:'ri-billiards-line',karaoke:'ri-mic-2-line',quests:'ri-door-open-line'};

  return (
    <div className="container fade-in" style={{paddingTop:20}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-calendar-event-line"></i><h1>{t('events')}</h1></div>
        <p style={{color:'var(--text-muted)'}}>kino.kz + Ticketon + 2GIS — {lang === 'ru' ? 'Афиша и активные развлечения Казахстана' : 'Kazakhstan events and activities'}</p>
      </div>
      <form onSubmit={handleSearch} style={{display:'flex',gap:8,marginBottom:16}}>
        <input className="input" style={{flex:1}} placeholder={t('searchEvents')} value={query} onChange={e=>setQuery(e.target.value)} />
        <button type="submit" className="btn btn-primary btn-ripple"><i className="ri-search-line"></i></button>
        {searchMode && <button type="button" className="btn btn-secondary" onClick={clearSearch}><i className="ri-close-line"></i></button>}
      </form>
      {/* City selector */}
      <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap'}}>
        <button className={`cinema-translator-btn ${!activeCity?'active':''}`} onClick={()=>handleCity('')}>
          <i className="ri-earth-line"></i> {lang === 'ru' ? 'Все города' : 'All cities'}
        </button>
        {cities.map(c => (
          <button key={c} className={`cinema-translator-btn ${activeCity===c?'active':''}`} onClick={()=>handleCity(c)}>
            <i className="ri-map-pin-line"></i> {c}
          </button>
        ))}
      </div>
      {/* Category tabs */}
      <div className="cinema-tabs" style={{marginBottom:20}}>
        <button className={`cinema-tab ${!activeCat?'active':''}`} onClick={()=>handleCat('')}>
          <i className="ri-apps-line"></i> {lang === 'ru' ? 'Все' : 'All'}
        </button>
        {categories.map(c => (
          <button key={c.id} className={`cinema-tab ${activeCat===c.id?'active':''}`} onClick={()=>handleCat(c.id)}>
            <i className={catIcons[c.id]||'ri-star-line'}></i> {c.name}
          </button>
        ))}
      </div>
      {!loading && events.length > 0 && (
        <div className="results-info" style={{marginBottom:12}}><span className="results-count"><strong>{events.length}</strong> {t('resultsFound')}</span></div>
      )}
      {loading ? <SkeletonCard count={6} type="event" />
        : events.length===0 ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-calendar-event-line" style={{fontSize:'3rem'}}></i></div><h3>{t('noEvents')}</h3></div>
        : <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(min(100%,220px),1fr))',gap:16}}>{events.map((e,i) => {
          const d = e.date ? new Date(e.date) : null;
          const is2gis = e.source === '2gis.kz';
          return (
            <RevealSection key={e.id+'-'+i} className="event-card" delay={Math.min(i,10)*50}>
              {e.image && <div style={{position:'relative',overflow:'hidden',aspectRatio:'168/242',background:'var(--bg-tertiary)'}}>
                <img src={e.image} alt={e.title} loading="lazy" style={{width:'100%',height:'100%',objectFit:'cover',transition:'transform .3s'}} onMouseOver={ev=>ev.target.style.transform='scale(1.05)'} onMouseOut={ev=>ev.target.style.transform='scale(1)'} />
                {e.source && <span className="event-source-pill" style={{position:'absolute',top:6,left:6,backdropFilter:'blur(6px)'}}>{e.source}</span>}
                {e.age && <span style={{position:'absolute',top:6,right:6,background:'rgba(0,0,0,.75)',color:'#fff',padding:'2px 6px',borderRadius:5,fontSize:'.65rem',fontWeight:700,backdropFilter:'blur(4px)'}}>{e.age}</span>}
                {d && <div style={{position:'absolute',bottom:6,left:6,background:'rgba(0,0,0,.75)',backdropFilter:'blur(4px)',borderRadius:8,padding:'4px 8px',textAlign:'center',lineHeight:1.1}}>
                  <div style={{fontSize:'.95rem',fontWeight:700,color:'var(--accent)'}}>{d.getDate()}</div>
                  <div style={{fontSize:'.6rem',textTransform:'uppercase',color:'rgba(255,255,255,.7)',letterSpacing:'.04em'}}>{monthNames[d.getMonth()]}</div>
                </div>}
              </div>}
              {!e.image && <div className="event-place-cover">
                <i className={catIcons[e.category] || (is2gis ? 'ri-map-pin-2-line' : 'ri-calendar-event-line')}></i>
                <span>{e.source || e.type}</span>
              </div>}
              <div style={{padding:'10px 12px 12px'}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <span className="badge badge-accent" style={{fontSize:'.65rem',padding:'2px 7px'}}>{e.type}</span>
                  {!e.image && e.source && <span className="event-source-pill">{e.source}</span>}
                </div>
                <div style={{fontSize:'.88rem',fontWeight:600,marginBottom:6,lineHeight:1.3,display:'-webkit-box',WebkitLineClamp:2,WebkitBoxOrient:'vertical',overflow:'hidden'}}>{e.title}</div>
                <div className="event-card-compact-meta">
                  {e.venue && <div className="event-card-info-chip event-card-venue"><i className="ri-map-pin-2-fill"></i><span className="event-card-info-text">{e.venue}{e.city?', '+e.city:''}</span></div>}
                  {e.time && <div className="event-card-info-chip event-card-time"><i className="ri-time-line"></i><span className="event-card-info-text">{e.time}</span></div>}
                  {e.rating && <div className="event-card-info-chip event-card-rating"><i className="ri-star-fill"></i><span className="event-card-info-text">{e.rating}{e.review_count ? ` (${e.review_count})` : ''}</span></div>}
                  {e.price && <div className="event-card-info-chip event-card-price"><i className="ri-ticket-line"></i><span className="event-card-info-text">{e.price}</span></div>}
                </div>
                {e.description && <div className="event-card-description">{e.description}</div>}
                {e.url && <a href={e.url} target="_blank" rel="noopener noreferrer" className="btn btn-primary btn-sm btn-ripple" style={{width:'100%',marginTop:8,textAlign:'center',fontSize:'.75rem',padding:'6px 0'}}>
                  <i className={is2gis ? 'ri-map-pin-2-line' : 'ri-ticket-line'}></i> {is2gis ? (lang === 'ru' ? 'Открыть в 2GIS' : 'Open in 2GIS') : (lang === 'ru' ? 'Купить билет' : 'Buy ticket')}
                </a>}
              </div>
            </RevealSection>
          );
        })}</div>}
    </div>
  );
}

function DetailPage({ navigate, goBack, id, type }) {
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [item, setItem] = useState(null);
  const [similar, setSimilar] = useState([]);
  const [videos, setVideos] = useState([]);
  const [showTrailer, setShowTrailer] = useState(false);
  const [isFav, setIsFav] = useState(false);
  const [inWatchlist, setInWatchlist] = useState(false);
  const [isConsumed, setIsConsumed] = useState(false);
  const [rating, setRating] = useState(0);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true); setShowTrailer(false); setVideos([]);
    if (type === 'movie') {
      api.get('/api/movies/' + id).then(setItem).finally(() => setLoading(false));
      api.get('/api/movies/' + id + '/recommendations').then(setSimilar).catch(() => {});
      api.get('/api/movies/' + id + '/videos').then(setVideos).catch(() => {});
    } else {
      const key = decodeURIComponent(id);
      api.get('/api/books/detail/' + key).then(setItem).finally(() => setLoading(false));
    }
    if (user) {
      const itemId = type === 'book' ? decodeURIComponent(id) : id;
      api.get('/api/profile/favorites/check?item_type='+type+'&item_id='+encodeURIComponent(itemId)).then(d=>setIsFav(d.is_favorite)).catch(()=>{});
      api.get('/api/profile/ratings/check?item_type='+type+'&item_id='+encodeURIComponent(itemId)).then(d=>setRating(d.rating)).catch(()=>{});
      api.get('/api/profile/watchlist/check?item_type='+type+'&item_id='+encodeURIComponent(itemId)).then(d=>setInWatchlist(d.in_watchlist)).catch(()=>{});
      apiFetch('/api/assistant/activity/check?item_type='+type+'&item_id='+encodeURIComponent(itemId)).then(d=>{if(d)setIsConsumed(d.consumed)}).catch(()=>{});
    }
  }, [id, type, user]);

  const toggleFav = async () => {
    if (!user) { toast.addToast(t('loginRequired'), 'error'); return; }
    const itemId = type === 'book' ? decodeURIComponent(id) : id;
    if (isFav) { await api.del('/api/profile/favorites', {item_type:type, item_id:itemId}); setIsFav(false); toast.addToast(t('removedFromFavorites'), 'info'); }
    else {
      const genres = item?.genres?.map(g => g.name||g) || item?.subjects || [];
      await api.post('/api/profile/favorites', {item_type:type, item_id:itemId, title:item?.title||'', image_url:item?.poster_url||item?.cover_url||'', metadata:{genres}});
      setIsFav(true); toast.addToast(t('addedToFavorites'), 'success');
    }
  };

  const handleRate = async (r) => {
    if (!user) { toast.addToast(t('loginRequired'), 'error'); return; }
    const itemId = type === 'book' ? decodeURIComponent(id) : id;
    await api.post('/api/profile/ratings', {item_type:type, item_id:itemId, rating:r});
    setRating(r); toast.addToast(t('ratingSet') + ' ' + '&#9733;'.repeat(r), 'success');
  };

  if (loading) return <div className="container" style={{paddingTop:40}}><div className="detail-layout"><div className="detail-poster"><div className="skeleton" style={{width:'100%',paddingTop:'150%',borderRadius:'var(--radius-md)'}}></div></div><div className="detail-info" style={{flex:1}}><div className="skeleton" style={{width:'60%',height:36,marginBottom:16}}></div><div className="skeleton" style={{width:'40%',height:20,marginBottom:16}}></div><div className="skeleton" style={{width:'100%',height:80,marginBottom:16}}></div></div></div></div>;
  if (!item) return <div className="container empty-state fade-in"><div className="empty-icon"><i className="ri-emotion-sad-line float" style={{fontSize:'3rem'}}></i></div><h3>{t('notFound')}</h3></div>;
  const isMovie = type === 'movie';
  const trailerKey = videos?.[0]?.key;

  return (
    <div style={{position:'relative'}} className="fade-in">
      {isMovie && item.backdrop_url && (
        <div className="detail-backdrop" style={{backgroundImage:`url(${item.backdrop_url})`}}><div className="detail-overlay"></div></div>
      )}
      <div className="container detail-content">
        <BackButton goBack={goBack} />
        <div className="detail-layout">
          <div className="detail-poster">
            {(item.poster_url||item.cover_url) ? <ProgressiveImg src={item.poster_url||item.cover_url} alt={item.title} style={{width:'100%',borderRadius:'var(--radius-lg)',boxShadow:'0 16px 60px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.06)',border:'1px solid rgba(255,255,255,.06)'}} />
              : <div className="detail-poster-ph"><span>{item.title?.[0]}</span></div>}
          </div>
          <div className="detail-info">
            <h1 className="detail-title">{item.title}</h1>
            <div className="detail-meta">
              {isMovie && item.vote_average > 0 && <span className="rating-badge"><i className="ri-star-fill"></i> {item.vote_average.toFixed(1)}</span>}
              {isMovie && item.release_date && <span className="badge badge-accent">{item.release_date.slice(0,4)}</span>}
              {!isMovie && item.first_publish_date && <span className="badge badge-accent">{item.first_publish_date}</span>}
              {!isMovie && item.authors?.length > 0 && <span style={{color:'var(--text-secondary)'}}>{item.authors.join(', ')}</span>}
            </div>
            <div className="detail-genres">
              {(item.genres||item.subjects||[]).map((g,i) => <span key={i} className="badge badge-accent">{g.name||g}</span>)}
            </div>
            {(item.overview||item.description) && <p className="detail-overview">{item.overview||item.description}</p>}
            <div className="detail-actions">
              <button className={`btn btn-ripple ${isFav?'btn-success':'btn-secondary'}`} onClick={toggleFav}>
                <i className={isFav?'ri-heart-fill':'ri-heart-line'}></i> {isFav ? t('inFavorites') : t('addToFavorites')}
              </button>
              <button className={`btn btn-ripple ${inWatchlist?'btn-success':'btn-secondary'}`} onClick={async()=>{
                if (!user) { toast.addToast(t('loginRequired'),'error'); return; }
                const itemId = type==='book'?decodeURIComponent(id):id;
                if (inWatchlist) { await api.del('/api/profile/watchlist',{item_type:type,item_id:itemId}); setInWatchlist(false); toast.addToast(t('removedFromFavorites'),'info'); }
                else { await api.post('/api/profile/watchlist',{item_type:type,item_id:itemId,title:item?.title||'',image_url:item?.poster_url||item?.cover_url||''}); setInWatchlist(true); toast.addToast(t('addToWatchlist'),'success'); }
              }}>
                <i className={inWatchlist?'ri-bookmark-fill':'ri-bookmark-line'}></i> {inWatchlist ? t('inWatchlist') : t('addToWatchlist')}
              </button>
              <button className={`btn btn-ripple ${isConsumed?'btn-success':'btn-secondary'}`} onClick={async()=>{
                if (!user) { toast.addToast(t('loginRequired'),'error'); return; }
                const itemId = type==='book'?decodeURIComponent(id):id;
                if (!isConsumed) {
                  await apiFetch('/api/assistant/activity',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({item_type:type,item_id:itemId,title:item?.title||'',image_url:item?.poster_url||item?.cover_url||''})});
                  setIsConsumed(true); toast.addToast(t('consumed'),'success');
                } else {
                  await apiFetch('/api/assistant/activity',{method:'DELETE',headers:{'Content-Type':'application/json'},body:JSON.stringify({item_type:type,item_id:itemId})});
                  setIsConsumed(false);
                }
              }}>
                <i className={isConsumed?'ri-check-double-fill':'ri-check-line'}></i> {isConsumed ? t('consumed') : t('markConsumed')}
              </button>
              <div className="detail-rating"><span><i className="ri-star-line"></i> {t('yourRating')}</span><Stars value={rating} onChange={handleRate} large /></div>
              {isMovie && trailerKey && (
                <button className="btn btn-primary btn-ripple" onClick={()=>setShowTrailer(!showTrailer)}>
                  <i className={showTrailer?'ri-eye-off-line':'ri-play-circle-line'}></i> {showTrailer ? t('hideTrailer') : t('watchTrailer')}
                </button>
              )}
            </div>
          </div>
        </div>

        {isMovie && trailerKey && showTrailer && (
          <section className="trailer-section scale-in">
            <h2 className="section-title">{t('trailer')}</h2>
            <div className="trailer-container">
              <iframe
                src={`https://www.youtube.com/embed/${trailerKey}?autoplay=1&rel=0`}
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowFullScreen
                title={t('trailer')}
              />
            </div>
          </section>
        )}

        {isMovie && trailerKey && !showTrailer && (
          <section className="trailer-section">
            <h2 className="section-title">{t('trailer')}</h2>
            <div className="trailer-thumb" onClick={()=>setShowTrailer(true)}>
              <img src={`https://img.youtube.com/vi/${trailerKey}/hqdefault.jpg`}
                alt={t('trailer')} />
              <div className="trailer-play-btn"><i className="ri-play-fill"></i></div>
              <div className="trailer-label"><i className="ri-play-fill"></i> {videos?.[0]?.name || t('trailer')}</div>
            </div>
          </section>
        )}

        {similar.length > 0 && (
          <RevealSection className="detail-similar">
            <h2 className="section-title"><i className="ri-movie-2-line"></i> {t('similarMovies')}</h2>
            <CarouselWithNav>{similar.map(m => <Card key={m.id} type="movie" image={m.poster_url} title={m.title} subtitle={m.release_date?.slice(0,4)} rating={m.vote_average} onClick={()=>navigate('/movies/'+m.id)} />)}</CarouselWithNav>
          </RevealSection>
        )}
      </div>
    </div>
  );
}

function LoginPage({ navigate }) {
  const { login } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try { await login(username, password); toast.addToast(t('loginSuccess'), 'success'); navigate('/'); }
    catch(e) { setError(e.error || 'Login failed'); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-header"><div className="auth-brand"><BrandLogo /><span className="brand-text">Pulse</span></div><h1>{t('welcomeBack')}</h1><p>{t('signInDesc')}</p></div>
        {error && <div className="auth-error"><i className="ri-error-warning-line"></i> {error}</div>}
        <form onSubmit={handleSubmit} className="auth-form">
          <div className="form-group"><label><i className="ri-user-line"></i> {t('username')}</label><div className="form-input-wrap"><i className="ri-user-line"></i><input className="input" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username" /></div></div>
          <div className="form-group"><label><i className="ri-lock-line"></i> {t('password')}</label><div className="form-input-wrap"><i className="ri-lock-line"></i><input type="password" className="input" value={password} onChange={e=>setPassword(e.target.value)} required autoComplete="current-password" /></div></div>
          <button type="submit" className="btn btn-primary btn-full btn-ripple" disabled={loading}>{loading?<><i className="ri-loader-4-line" style={{animation:'spin .8s linear infinite'}}></i> {t('signingIn')}</>:<><i className="ri-login-box-line"></i> {t('signIn')}</>}</button>
        </form>
        <p className="auth-switch">{t('noAccount')} <a onClick={()=>navigate('/register')}><i className="ri-user-add-line"></i> {t('register')}</a></p>
      </div>
    </div>
  );
}

function RegisterPage({ navigate }) {
  const { register } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [username, setUsername] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault(); setError(''); setLoading(true);
    try { await register(username, email, password); toast.addToast(t('registerSuccess'), 'success'); navigate('/'); }
    catch(e) { setError(e.error || 'Registration failed'); }
    finally { setLoading(false); }
  };

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-header"><div className="auth-brand"><BrandLogo /><span className="brand-text">Pulse</span></div><h1>{t('createAccount')}</h1><p>{t('joinDesc')}</p></div>
        {error && <div className="auth-error"><i className="ri-error-warning-line"></i> {error}</div>}
        <form onSubmit={handleSubmit} className="auth-form">
          <div className="form-group"><label><i className="ri-user-line"></i> {t('username')}</label><div className="form-input-wrap"><i className="ri-user-line"></i><input className="input" value={username} onChange={e=>setUsername(e.target.value)} required autoComplete="username" /></div></div>
          <div className="form-group"><label><i className="ri-mail-line"></i> {t('email')}</label><div className="form-input-wrap"><i className="ri-mail-line"></i><input type="email" className="input" value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="email" /></div></div>
          <div className="form-group"><label><i className="ri-lock-line"></i> {t('password')}</label><div className="form-input-wrap"><i className="ri-lock-line"></i><input type="password" className="input" value={password} onChange={e=>setPassword(e.target.value)} required minLength={4} autoComplete="new-password" /></div></div>
          <button type="submit" className="btn btn-primary btn-full btn-ripple" disabled={loading}>{loading?<><i className="ri-loader-4-line" style={{animation:'spin .8s linear infinite'}}></i> {t('creatingAccount')}</>:<><i className="ri-user-add-line"></i> {t('createAccount')}</>}</button>
        </form>
        <p className="auth-switch">{t('haveAccount')} <a onClick={()=>navigate('/login')}><i className="ri-login-box-line"></i> {t('signIn')}</a></p>
      </div>
    </div>
  );
}

function ProfilePage({ navigate }) {
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [tab, setTab] = useState('favorites');
  const [favorites, setFavorites] = useState([]);
  const [ratings, setRatings] = useState([]);
  const [taste, setTaste] = useState(null);
  const [loading, setLoading] = useState(true);
  const [aiPrefs, setAiPrefs] = useState(null);
  const [aiPrefEdit, setAiPrefEdit] = useState({ favorite_categories: [], disliked_categories: [], favorite_platforms: [], preferred_language: 'ru', age_rating: 'any', discovery_mode: 'balanced' });
  const [savingPrefs, setSavingPrefs] = useState(false);
  const [watchlist, setWatchlist] = useState([]);
  const [profileStats, setProfileStats] = useState(null);

  useEffect(() => { if (!user) { navigate('/login'); return; } loadData(); }, [user, tab]);
  const loadData = () => {
    setLoading(true);
    if (tab==='favorites') api.get('/api/profile/favorites').then(setFavorites).finally(()=>setLoading(false));
    else if (tab==='ratings') api.get('/api/profile/ratings').then(setRatings).finally(()=>setLoading(false));
    else if (tab==='watchlist') api.get('/api/profile/watchlist').then(setWatchlist).finally(()=>setLoading(false));
    else if (tab==='insights') {
      api.get('/api/profile/stats').then(setProfileStats).finally(()=>setLoading(false));
    }
    else if (tab==='ai_prefs') {
      api.get('/api/ai/preferences').then(p => {
        setAiPrefs(p);
        setAiPrefEdit({
          favorite_categories: p.favorite_categories ? p.favorite_categories.split(', ').filter(Boolean) : [],
          disliked_categories: p.disliked_categories ? p.disliked_categories.split(', ').filter(Boolean) : [],
          favorite_platforms: p.favorite_platforms ? p.favorite_platforms.split(', ').filter(Boolean) : [],
          preferred_language: p.preferred_language || 'ru',
          age_rating: p.age_rating || 'any',
          discovery_mode: p.discovery_mode || 'balanced',
        });
      }).finally(()=>setLoading(false));
    }
    else api.get('/api/recommendations/taste').then(setTaste).finally(()=>setLoading(false));
  };
  const toggleAiPref = (field, val) => {
    setAiPrefEdit(prev => ({...prev, [field]: prev[field].includes(val) ? prev[field].filter(x=>x!==val) : [...prev[field], val]}));
  };
  const removeWatchlistItem = async (item) => {
    await api.del('/api/profile/watchlist', { item_type: item.item_type, item_id: item.item_id });
    setWatchlist(prev => prev.filter(x => !(x.item_type===item.item_type && x.item_id===item.item_id)));
    toast.addToast(t('removedFromFavorites'), 'info');
  };
  const saveAiPrefs = async () => {
    setSavingPrefs(true);
    try {
      await api.put('/api/ai/preferences', aiPrefEdit);
      toast.addToast(t('aiPrefSaved'), 'success');
    } catch(e) {}
    setSavingPrefs(false);
  };
  const removeFav = async (f) => {
    await api.del('/api/profile/favorites', {item_type:f.item_type, item_id:f.item_id});
    setFavorites(prev => prev.filter(x => !(x.item_type===f.item_type && x.item_id===f.item_id)));
    toast.addToast(t('removedFromFavorites'), 'info');
  };

  if (!user) return null;
  const grouped = favorites.reduce((a,f) => { if(!a[f.item_type])a[f.item_type]=[]; a[f.item_type].push(f); return a; }, {});
  const typeLabel = (tp) => tp==='movie'?t('movies'):tp==='book'?t('books'):tp==='music'?t('music'):t('events');
  const typeIcon = (tp) => tp==='movie'?'&#127909;':tp==='book'?'&#128218;':tp==='music'?'&#127925;':'&#127915;';

  return (
    <div className="container fade-in" style={{paddingTop:20}}>
      <div className="profile-header">
        <div className="profile-avatar-lg">{user.username[0].toUpperCase()}</div>
        <div style={{flex:1}}>
          <h1 style={{fontSize:'1.6rem',fontWeight:800}}>{user.username}</h1>
          <p className="profile-email">{user.email}</p>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={async () => {
          try {
            const res = await fetch('/api/profile/export', { headers: { 'Authorization': `Bearer ${api.token}` } });
            if (!res.ok) throw new Error();
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `pulse_export.json`; a.click(); URL.revokeObjectURL(url);
            toast.addToast(t('exportSuccess') || 'Data exported', 'success');
          } catch(e) { toast.addToast('Export error', 'error'); }
        }} aria-label={t('exportData') || 'Export data'}><i className="ri-download-2-line"></i> {t('exportData') || 'Export'}</button>
      </div>
      <div className="tabs">
        <button className={`tab ${tab==='favorites'?'active':''}`} onClick={()=>setTab('favorites')}><i className="ri-heart-line"></i> {t('favorites')}</button>
        <button className={`tab ${tab==='watchlist'?'active':''}`} onClick={()=>setTab('watchlist')}><i className="ri-bookmark-line"></i> {t('watchlist')}</button>
        <button className={`tab ${tab==='ratings'?'active':''}`} onClick={()=>setTab('ratings')}><i className="ri-star-line"></i> {t('ratings')}</button>
        <button className={`tab ${tab==='insights'?'active':''}`} onClick={()=>setTab('insights')}><i className="ri-bar-chart-2-line"></i> {t('insightsTitle')}</button>
        <button className={`tab ${tab==='taste'?'active':''}`} onClick={()=>setTab('taste')}><i className="ri-pie-chart-line"></i> {t('tasteProfile')}</button>
        <button className={`tab ${tab==='ai_prefs'?'active':''}`} onClick={()=>setTab('ai_prefs')}><i className="ri-robot-2-line"></i> {t('aiPreferences')}</button>
      </div>
      {loading ? <SkeletonList count={5} /> : <>
        {tab==='favorites' && (favorites.length===0
          ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-heart-line float" style={{fontSize:'3rem'}}></i></div><h3>{t('noFavorites')}</h3><p>{t('noFavoritesDesc')}</p></div>
          : Object.entries(grouped).map(([tp, items]) => (
            <div key={tp} className="favorites-group fade-in" style={{marginBottom:32}}>
              <h2 className="section-title">{typeLabel(tp)}</h2>
              <div className="favorites-list">{items.map((f,i) => (
                <div key={f.item_type+f.item_id} className="fav-item" style={{animationDelay:`${i*0.05}s`}}>
                  {f.image_url ? <img src={f.image_url} className="fav-img" alt="" loading="lazy" /> : <div className="fav-img-ph">{f.title?.[0]}</div>}
                  <div className="fav-info">
                    <span className="fav-title" style={{cursor:'pointer'}} onClick={()=>navigate(`/${f.item_type}s/${f.item_type==='book'?encodeURIComponent(f.item_id):f.item_id}`)}>{f.title}</span>
                    <span className="badge badge-accent">{f.item_type}</span>
                  </div>
                  <button className="btn btn-sm btn-secondary" onClick={()=>removeFav(f)}><i className="ri-delete-bin-line"></i> {t('remove')}</button>
                </div>
              ))}</div>
            </div>
          ))
        )}
        {tab==='watchlist' && (watchlist.length===0
          ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-bookmark-line" style={{fontSize:'3rem'}}></i></div><h3>{t('watchlistEmpty')}</h3><p>{t('watchlistEmptyDesc')}</p></div>
          : <div className="watchlist-list">{watchlist.map((w,i) => (
            <div key={w.item_type+w.item_id} className="watchlist-item fade-in" style={{animationDelay:`${i*0.05}s`}}>
              {w.image_url ? <img src={w.image_url} className="watchlist-item-img" alt="" loading="lazy" /> : <div className="watchlist-item-img" style={{display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg-secondary)',fontSize:'.9rem',fontWeight:700}}>{w.title?.[0]}</div>}
              <div className="watchlist-item-info">
                <div className="watchlist-item-title" style={{cursor:'pointer'}} onClick={()=>navigate(`/${w.item_type}s/${w.item_type==='book'?encodeURIComponent(w.item_id):w.item_id}`)}>{w.title}</div>
                <div className="watchlist-item-type"><span className="badge badge-accent">{w.item_type}</span>{w.note && <span style={{marginLeft:8,color:'var(--text-muted)',fontSize:'.8rem'}}>{w.note}</span>}</div>
              </div>
              <button className="btn btn-sm btn-secondary" onClick={()=>removeWatchlistItem(w)}><i className="ri-delete-bin-line"></i></button>
            </div>
          ))}</div>
        )}
        {tab==='insights' && (
          <div className="fade-in">
            {profileStats ? (
              <>
                <div className="insights-grid">
                  <RevealSection className="insight-card"><div className="insight-card-icon"><i className="ri-heart-fill" style={{color:'var(--accent-primary)'}}></i></div><CountUpNumber value={profileStats.favorites||0} className="insight-card-num" /><div className="insight-card-label">{t('favorites')}</div></RevealSection>
                  <RevealSection className="insight-card" delay={60}><div className="insight-card-icon"><i className="ri-bookmark-fill" style={{color:'var(--warning)'}}></i></div><CountUpNumber value={profileStats.watchlist||0} className="insight-card-num" /><div className="insight-card-label">{t('watchlist')}</div></RevealSection>
                  <RevealSection className="insight-card" delay={120}><div className="insight-card-icon"><i className="ri-star-fill" style={{color:'#fbbf24'}}></i></div><CountUpNumber value={profileStats.ratings||0} className="insight-card-num" /><div className="insight-card-label">{t('ratings')}</div></RevealSection>
                  <RevealSection className="insight-card" delay={180}><div className="insight-card-icon"><i className="ri-robot-2-fill" style={{color:'var(--accent-primary)'}}></i></div><CountUpNumber value={profileStats.ai_queries||0} className="insight-card-num" /><div className="insight-card-label">{t('aiInteractions')}</div></RevealSection>
                  <RevealSection className="insight-card" delay={240}><div className="insight-card-icon"><i className="ri-chat-3-fill" style={{color:'var(--success)'}}></i></div><CountUpNumber value={profileStats.ai_sessions||0} className="insight-card-num" /><div className="insight-card-label">{t('sessionsCount')}</div></RevealSection>
                  <RevealSection className="insight-card" delay={300}><div className="insight-card-icon"><i className="ri-thumb-up-fill" style={{color:'#4ecca3'}}></i></div><CountUpNumber value={profileStats.ai_likes||0} className="insight-card-num" /><div className="insight-card-label">{t('likesGiven')}</div></RevealSection>
                </div>
                {profileStats.avg_rating > 0 && (
                  <RevealSection className="ai-prefs-group" style={{marginBottom:20,display:'flex',alignItems:'center',gap:20}}>
                    <StatRing value={profileStats.avg_rating} max={5} size={80} />
                    <div><h3 style={{margin:0}}><i className="ri-star-line"></i> {t('avgRating')}</h3><p style={{color:'var(--text-secondary)',fontSize:'.9rem',marginTop:4}}>{profileStats.avg_rating} / 5.0</p></div>
                  </RevealSection>
                )}
                {profileStats.favorites_by_type && Object.keys(profileStats.favorites_by_type).length > 0 && (
                  <div className="ai-prefs-group">
                    <h3><i className="ri-pie-chart-line"></i> {t('favorites')} {t('categories').toLowerCase()}</h3>
                    <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:12}}>
                      {Object.entries(profileStats.favorites_by_type).map(([tp, cnt]) => (
                        <div key={tp} className="greeting-stat"><span className="greeting-stat-num">{cnt}</span><span className="greeting-stat-label">{typeLabel(tp)}</span></div>
                      ))}
                    </div>
                  </div>
                )}
              </>
            ) : <div className="empty-state"><div className="empty-icon"><i className="ri-bar-chart-2-line" style={{fontSize:'3rem'}}></i></div><h3>{t('notEnoughData')}</h3></div>}
          </div>
        )}
        {tab==='ratings' && (ratings.length===0
          ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-star-line float" style={{fontSize:'3rem'}}></i></div><h3>{t('noRatings')}</h3><p>{t('noRatingsDesc')}</p></div>
          : <div className="ratings-list">{ratings.map((r,i) => (
            <div key={r.item_type+r.item_id} className="rating-item fade-in" style={{animationDelay:`${i*0.05}s`}}>
              {r.image_url ? <img src={r.image_url} className="fav-img" alt="" loading="lazy" /> : <div className="fav-img-ph">{(r.title||'?')[0]}</div>}
              <div className="fav-info"><span className="fav-title">{r.title||`${r.item_type} #${r.item_id}`}</span><span className="badge badge-accent">{r.item_type}</span></div>
              <Stars value={r.rating} readonly />
            </div>
          ))}</div>
        )}
        {tab==='taste' && (!taste || taste.stats.total_ratings===0
          ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-pie-chart-line float" style={{fontSize:'3rem'}}></i></div><h3>{t('notEnoughData')}</h3><p>{t('notEnoughDataDesc')}</p></div>
          : <div className="fade-in">
            <div className="taste-stats">
              <RevealSection className="stat-card"><CountUpNumber value={taste.stats.total_favorites} className="stat-number" /><span className="stat-label">{t('favorites')}</span></RevealSection>
              <RevealSection className="stat-card" delay={80}><CountUpNumber value={taste.stats.total_ratings} className="stat-number" /><span className="stat-label">{t('ratings')}</span></RevealSection>
              <RevealSection className="stat-card" delay={160}><CountUpNumber value={taste.stats.avg_rating?.toFixed(1)} className="stat-number" /><span className="stat-label">{t('avgRating')}</span></RevealSection>
            </div>
            <h2 className="section-title">{t('yourTopGenres')}</h2>
            {Object.entries(taste.top_genres||{}).map(([cat, genres]) => (
              <div key={cat} className="genre-category">
                <h3>{typeLabel(cat)}</h3>
                {genres.slice(0,5).map((g,i) => {
                  const max = Math.max(...genres.map(x=>x.weight),1);
                  const pct = Math.max(10,(g.weight/max)*100);
                  return (
                    <div key={g.genre} className="genre-bar-row fade-in" style={{animationDelay:`${i*0.1}s`}}>
                      <span className="genre-bar-label">{g.genre}</span>
                      <div className="genre-bar-track"><div className="genre-bar-fill" style={{width:pct+'%'}}></div></div>
                      <span className="genre-bar-val">{g.weight.toFixed(1)}</span>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
        {tab==='ai_prefs' && (
          <div className="ai-prefs-form fade-in">
            <div className="ai-prefs-group">
              <h3><i className="ri-heart-line"></i> {t('aiPrefCategories')}</h3>
              <div className="ai-prefs-tags">
                {['movie','series','anime','game','music','book'].map(c => (
                  <button key={c} className={`ai-prefs-tag ${aiPrefEdit.favorite_categories.includes(c)?'selected':''}`} onClick={()=>toggleAiPref('favorite_categories',c)}>
                    <i className={c==='movie'?'ri-film-line':c==='series'?'ri-tv-line':c==='anime'?'ri-leaf-line':c==='game'?'ri-gamepad-line':c==='music'?'ri-music-2-line':'ri-book-2-line'}></i> {c}
                  </button>
                ))}
              </div>
            </div>
            <div className="ai-prefs-group">
              <h3><i className="ri-device-line"></i> {t('aiPrefPlatforms')}</h3>
              <div className="ai-prefs-tags">
                {['Netflix','Кинопоиск','YouTube','Steam','PlayStation','Xbox','Nintendo','Spotify','PC','Android','iOS'].map(p => (
                  <button key={p} className={`ai-prefs-tag ${aiPrefEdit.favorite_platforms.includes(p)?'selected':''}`} onClick={()=>toggleAiPref('favorite_platforms',p)}>
                    {p}
                  </button>
                ))}
              </div>
            </div>
            <div className="ai-prefs-group">
              <h3><i className="ri-settings-3-line"></i> {t('aiPrefDiscovery')}</h3>
              <select className="ai-prefs-select" value={aiPrefEdit.discovery_mode} onChange={e=>setAiPrefEdit(p=>({...p,discovery_mode:e.target.value}))}>
                <option value="balanced">{t('balanced')}</option>
                <option value="adventurous">{t('adventurous')}</option>
                <option value="conservative">{t('conservative')}</option>
              </select>
            </div>
            <div className="ai-prefs-group">
              <h3><i className="ri-translate-2"></i> {t('aiPrefLanguage')}</h3>
              <select className="ai-prefs-select" value={aiPrefEdit.preferred_language} onChange={e=>setAiPrefEdit(p=>({...p,preferred_language:e.target.value}))}>
                <option value="ru">Русский</option>
                <option value="en">English</option>
              </select>
            </div>
            <div className="ai-prefs-group">
              <h3><i className="ri-shield-check-line"></i> {t('aiPrefAgeRating')}</h3>
              <select className="ai-prefs-select" value={aiPrefEdit.age_rating} onChange={e=>setAiPrefEdit(p=>({...p,age_rating:e.target.value}))}>
                <option value="any">Any / Любой</option>
                <option value="family">Family / Семейный (0+)</option>
                <option value="teen">Teen / Подростковый (12+)</option>
                <option value="mature">Mature / Взрослый (18+)</option>
              </select>
            </div>
            <button className="btn btn-primary btn-full" onClick={saveAiPrefs} disabled={savingPrefs}>
              {savingPrefs ? <><div className="spinner" style={{width:16,height:16,borderWidth:2}}></div> {t('loading')}</> : <><i className="ri-save-line"></i> {t('aiPrefSave')}</>}
            </button>
          </div>
        )}
      </>}
    </div>
  );
}

// ==================== AI HISTORY PAGE ====================
function AiHistoryPage({ navigate }) {
  const { user } = useAuth();
  const { t } = useLang();
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedChat, setSelectedChat] = useState(null);
  const [chatMessages, setChatMessages] = useState([]);
  const [chatLoading, setChatLoading] = useState(false);

  useEffect(() => { if (user) api.get('/api/ai/sessions').then(setSessions).finally(()=>setLoading(false)); }, [user]);

  const openChat = (sid) => {
    setChatLoading(true);
    setSelectedChat(sid);
    api.get('/api/ai/chat/'+sid).then(setChatMessages).finally(()=>setChatLoading(false));
  };

  if (!user) return <div className="container" style={{paddingTop:100}}><div className="empty-state"><div className="empty-icon"><i className="ri-robot-2-line"></i></div><h3>{t('loginRequired')}</h3><button className="btn btn-primary" onClick={()=>navigate('/login')} style={{marginTop:16}}>{t('login')}</button></div></div>;

  const formatDate = (ts) => { if (!ts) return ''; const d = new Date(ts); return d.toLocaleDateString('ru-RU', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}); };

  if (selectedChat) {
    return (
      <div className="container fade-in" style={{paddingTop:20}}>
        <button className="btn-back" onClick={()=>{setSelectedChat(null);setChatMessages([])}}><i className="ri-arrow-left-line"></i> {t('back')}</button>
        <div className="page-header"><div className="page-header-icon"><i className="ri-chat-3-line"></i><h1>{sessions.find(s=>s.session_id===selectedChat)?.title || t('aiHistory')}</h1></div></div>
        {chatLoading ? <div className="loader"><div className="spinner"></div></div> :
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {chatMessages.map((m,i) => {
              let recs = [];
              try { if (m.ai_response_json) recs = JSON.parse(m.ai_response_json); } catch(e) {}
              return (
                <React.Fragment key={i}>
                  {m.user_query && <div className="ai-msg-row ai-msg-user"><div className="ai-msg-bubble">{m.user_query}</div></div>}
                  <div className="ai-msg-row ai-msg-ai"><div className="ai-msg-bubble">
                    {Array.isArray(recs) && recs.length > 0 ? recs.map((r,j) => (
                      <div key={j} style={{padding:'8px 0',borderBottom:j<recs.length-1?'1px solid var(--border-color)':'none'}}>
                        <strong>{r.title}</strong>
                        {r.category && <span className="badge badge-accent" style={{marginLeft:8}}>{r.category}</span>}
                        {r.description && <p style={{fontSize:'.85rem',color:'var(--text-secondary)',marginTop:4}}>{r.description}</p>}
                      </div>
                    )) : <span style={{color:'var(--text-muted)'}}>{typeof recs === 'string' ? recs : t('noHistory')}</span>}
                  </div></div>
                </React.Fragment>
              );
            })}
          </div>
        }
      </div>
    );
  }

  return (
    <div className="container fade-in" style={{paddingTop:20}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-history-line"></i><h1>{t('aiHistory')}</h1></div></div>
      {loading ? <SkeletonList count={8} /> :
        sessions.length===0 ? <div className="empty-state fade-in"><div className="empty-icon"><i className="ri-chat-history-line" style={{fontSize:'3rem'}}></i></div><h3>{t('noHistory')}</h3><p>{t('noHistoryDesc')}</p><button className="btn btn-primary" onClick={()=>navigate('/ai')} style={{marginTop:16}}><i className="ri-robot-2-line"></i> {t('aiAssistant')}</button></div>
        : <div className="history-list">
          {sessions.map((s,i) => (
            <div key={s.session_id} className="history-item fade-in" style={{animationDelay:`${i*0.05}s`}} onClick={()=>openChat(s.session_id)}>
              <div className="history-icon"><i className="ri-chat-3-line"></i></div>
              <div className="history-info">
                <div className="history-title">{s.title}</div>
                <div className="history-meta">{formatDate(s.last_timestamp)}{s.preview && ` — ${s.preview}`}</div>
              </div>
              <div className="history-badge">{s.message_count} {t('messages')}</div>
            </div>
          ))}
        </div>
      }
    </div>
  );
}

// ==================== AI CHAT PAGE ====================
function AiRecCard({ rec, sessionId, onFeedback }) {
  const [videoLoaded, setVideoLoaded] = useState(false);
  const [feedbackState, setFeedbackState] = useState({});
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const v = rec.video_id;

  const doFeedback = (type) => {
    setFeedbackState(prev => ({...prev, [type]: !prev[type]}));
    onFeedback(rec.title, rec.category, type);
    if (type === 'watched' && user) {
      apiFetch('/api/assistant/activity', {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({item_type: (rec.category||'movie').toLowerCase().includes('книг')||rec.category?.toLowerCase().includes('book')?'book':'movie', item_id: rec.title, title: rec.title, action:'watched'})
      }).catch(()=>{});
    }
  };

  const isGame = (rec.category || '').toLowerCase().includes('игр') || (rec.category || '').toLowerCase().includes('game');
  const copyTitle = () => {
    navigator.clipboard.writeText(rec.title || '').then(() => toast.addToast(t('copied'), 'success')).catch(() => {});
  };

  return (
    <div className="ai-rec-card">
      {v && (
        <div className="ai-video-wrap" onClick={() => setVideoLoaded(true)}>
          {videoLoaded ? (
            <iframe src={`https://www.youtube.com/embed/${v}?autoplay=1`} allowFullScreen allow="autoplay" title={rec.title} />
          ) : (
            <>
              <img className="thumb-img" src={`https://img.youtube.com/vi/${v}/hqdefault.jpg`} alt={rec.title || 'Trailer'} />
              <div className="ai-play-overlay"><div className="ai-play-btn"><i className="ri-play-fill"></i></div></div>
            </>
          )}
        </div>
      )}
      <div className="ai-rec-header">
        <div className="ai-rec-title">{rec.title}</div>
        {(rec.year_genre || rec.category) && <div className="ai-rec-meta">{rec.year_genre}{rec.category && `, ${rec.category}`}</div>}
      </div>
      {rec.why_this && (
        <div className="ai-rec-why"><i className="ri-sparkling-2-fill"></i><span>{rec.why_this}</span></div>
      )}
      <div className="ai-rec-desc" dangerouslySetInnerHTML={{__html: (rec.description||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}}></div>
      <div className="ai-rec-actions">
        <button onClick={()=>{if(user){api.post('/api/profile/favorites',{item_type:'ai_rec',item_id:rec.title,title:rec.title,image_url:'',metadata:JSON.stringify({category:rec.category})}).then(()=>toast.addToast(t('addedToFavorites'),'success')).catch(()=>{})}}} title={t('toFavorites')}><i className="ri-heart-3-line"></i> {t('toFavorites')}</button>
        <button className={feedbackState.like?'fb-active':''} onClick={()=>doFeedback('like')}><i className="ri-thumb-up-line"></i> Нравится</button>
        <button className={feedbackState.dislike?'fb-active':''} onClick={()=>doFeedback('dislike')}><i className="ri-thumb-down-line"></i> {t('doesntFit')}</button>
        <button className={feedbackState.watched?'fb-active':''} onClick={()=>doFeedback('watched')}><i className="ri-eye-line"></i> {t('alreadyWatched')}</button>
        <button onClick={copyTitle}><i className="ri-file-copy-line"></i> Скопировать</button>
        {v && <button onClick={()=>window.open(`https://www.youtube.com/watch?v=${v}`,'_blank','noopener')}><i className="ri-youtube-line"></i> Открыть YouTube</button>}
        {isGame && <button onClick={()=>window.open(`https://store.steampowered.com/search/?term=${encodeURIComponent(rec.title)}`,'_blank','noopener')}><i className="ri-gamepad-line"></i> Открыть Steam</button>}
      </div>
    </div>
  );
}

function AiChatPage({ navigate }) {
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [sessionId] = useState(() => 'sess_' + Date.now());
  const [tempMode, setTempMode] = useState(false);
  const [ctx, setCtx] = useState({ assistant_mode: 'balanced', mood: '', company: '', time_minutes: '' });
  const streamRef = useRef(null);
  const QUICK = [
    ['ri-movie-2-line', 'Посоветуй фильм в жанре киберпанк'],
    ['ri-gamepad-line', 'Игра для компании друзей на ПК'],
    ['ri-headphone-line', 'Музыка для программирования без слов'],
    ['ri-tv-line', 'Сериал с сильным сюжетом на вечер'],
  ];

  useEffect(() => { if (streamRef.current) streamRef.current.scrollTop = streamRef.current.scrollHeight; }, [messages]);

  if (!user) return <div className="container" style={{paddingTop:100}}><div className="empty-state"><div className="empty-icon"><i className="ri-robot-2-line"></i></div><h3>{t('loginRequired')}</h3><button className="btn btn-primary" onClick={()=>navigate('/login')} style={{marginTop:16}}>{t('login')}</button></div></div>;

  const sendQuery = async (query) => {
    if (!query.trim() || loading) return;
    const q = query.trim();
    setInput('');
    setMessages(prev => [...prev, {role:'user', text:q}]);
    setLoading(true);
    try {
      const res = await api.post('/api/ai/recommend', {
        query: q,
        session_id: sessionId,
        temporary: tempMode,
        mood: ctx.mood || null,
        company: ctx.company || null,
        time_minutes: ctx.time_minutes ? Number(ctx.time_minutes) : null,
        assistant_mode: ctx.assistant_mode || 'balanced',
      });
      if (res.is_json) {
        setMessages(prev => [...prev, {role:'ai', recs: res.recommendations, source: res.source, queryText: q}]);
      } else {
        setMessages(prev => [...prev, {role:'ai', text: res.recommendations}]);
      }
    } catch(e) {
      setMessages(prev => [...prev, {role:'ai', text: 'Ошибка при запросе. Попробуйте ещё раз.'}]);
    }
    setLoading(false);
  };

  const handleFeedback = async (title, category, type) => {
    try {
      await api.post('/api/ai/feedback', { title, category, feedback_type: type, session_id: sessionId });
      toast.addToast(type === 'like' ? t('liked') : type === 'dislike' ? t('disliked') : t('watched'), 'success');
    } catch(e) {}
  };

  return (
    <div className="ai-page">
      {messages.length === 0 ? (
        <>
          <div className="ai-welcome">
            <div className="ai-welcome-icon"><i className="ri-sparkling-2-fill"></i></div>
            <h2>{t('aiAssistant')}</h2>
            <p>{t('aiDesc')}</p>
            <div className="ai-context-bar">
              <select className="ai-ctx-select" value={ctx.assistant_mode} onChange={e=>setCtx(p=>({...p,assistant_mode:e.target.value}))}>
                <option value="balanced">{t('modeBalanced')}</option>
                <option value="fast">{t('modeFast')}</option>
                <option value="deep">{t('modeDeep')}</option>
                <option value="surprise">{t('modeSurprise')}</option>
              </select>
              <select className="ai-ctx-select" value={ctx.mood} onChange={e=>setCtx(p=>({...p,mood:e.target.value}))}>
                <option value="">{t('mood')}</option>
                <option value="relax">{t('moodRelax')}</option>
                <option value="focus">{t('moodFocus')}</option>
                <option value="fun">{t('moodFun')}</option>
              </select>
              <select className="ai-ctx-select" value={ctx.company} onChange={e=>setCtx(p=>({...p,company:e.target.value}))}>
                <option value="">{t('company')}</option>
                <option value="solo">{t('companySolo')}</option>
                <option value="friends">{t('companyFriends')}</option>
                <option value="family">{t('companyFamily')}</option>
              </select>
              <input className="ai-ctx-time" type="number" min="15" max="300" step="15" placeholder={t('minutes')} value={ctx.time_minutes} onChange={e=>setCtx(p=>({...p,time_minutes:e.target.value}))} />
              <label className="ai-ctx-toggle" title={t('incognito')}>
                <input type="checkbox" checked={tempMode} onChange={e=>setTempMode(e.target.checked)} />
                <i className="ri-spy-line"></i>
              </label>
            </div>
            <div className="ai-suggestions">
              {QUICK.map(([icon, text]) => <div key={text} className="ai-chip" onClick={()=>sendQuery(text)}><i className={icon}></i><span>{text}</span></div>)}
            </div>
          </div>
          <div style={{flex:1}}></div>
        </>
      ) : (
        <div className="ai-chat-wrap">
          <div className="ai-context-bar" style={{margin:'0 0 12px',position:'sticky',top:0,zIndex:5}}>
            <select className="ai-ctx-select" value={ctx.assistant_mode} onChange={e=>setCtx(p=>({...p,assistant_mode:e.target.value}))}>
              <option value="balanced">{t('modeBalanced')}</option>
              <option value="fast">{t('modeFast')}</option>
              <option value="deep">{t('modeDeep')}</option>
              <option value="surprise">{t('modeSurprise')}</option>
            </select>
            <select className="ai-ctx-select" value={ctx.mood} onChange={e=>setCtx(p=>({...p,mood:e.target.value}))}>
              <option value="">{t('mood')}</option>
              <option value="relax">{t('moodRelax')}</option>
              <option value="focus">{t('moodFocus')}</option>
              <option value="fun">{t('moodFun')}</option>
            </select>
            <select className="ai-ctx-select" value={ctx.company} onChange={e=>setCtx(p=>({...p,company:e.target.value}))}>
              <option value="">{t('company')}</option>
              <option value="solo">{t('companySolo')}</option>
              <option value="friends">{t('companyFriends')}</option>
              <option value="family">{t('companyFamily')}</option>
            </select>
            <input className="ai-ctx-time" type="number" min="15" max="300" step="15" placeholder={t('minutes')} value={ctx.time_minutes} onChange={e=>setCtx(p=>({...p,time_minutes:e.target.value}))} />
            <label className="ai-ctx-toggle" title={t('incognito')}>
              <input type="checkbox" checked={tempMode} onChange={e=>setTempMode(e.target.checked)} />
              <i className="ri-spy-line"></i>
            </label>
          </div>
          <div className="ai-chat-stream" ref={streamRef}>
            {messages.map((m,i) => {
              if (m.role === 'user') return <div key={i} className="ai-msg-row ai-msg-user"><div className="ai-msg-bubble">{m.text}</div></div>;
              if (m.text) return <div key={i} className="ai-msg-row ai-msg-ai"><div className="ai-msg-bubble">{m.text}</div></div>;
              if (m.recs) return <div key={i} className="ai-msg-row ai-msg-ai"><div style={{width:'100%'}}>
                {m.source && <div className="ai-source-tag"><i className="ri-cpu-line"></i>{m.source.startsWith('llm') ? 'Gemini AI' : 'Офлайн-библиотека'}</div>}
                {m.recs.map((r,j) => <AiRecCard key={j} rec={r} sessionId={sessionId} onFeedback={handleFeedback} />)}
              </div></div>;
              return null;
            })}
            {loading && <div className="ai-msg-row ai-msg-ai"><div className="ai-msg-bubble" style={{display:'flex',alignItems:'center',gap:10}}><div className="spinner" style={{width:18,height:18,borderWidth:2}}></div><span style={{color:'var(--text-muted)',fontSize:'.85rem'}}>{t('pickingRecs')}</span></div></div>}
          </div>
        </div>
      )}
      <div className="ai-input-dock">
        <input className="input" placeholder={t('askAI')} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')sendQuery(input)}} disabled={loading} />
        <button className="btn btn-primary" onClick={()=>sendQuery(input)} disabled={loading}><i className="ri-send-plane-2-fill"></i></button>
      </div>
    </div>
  );
}

// ==================== ADMIN PAGE ====================
function AdminPage({ navigate }) {
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [tab, setTab] = useState('stats');
  const [stats, setStats] = useState(null);
  const [users, setUsers] = useState([]);
  const [rules, setRules] = useState([]);
  const [pinned, setPinned] = useState([]);
  const [settings, setSettings] = useState(null);
  const [newRule, setNewRule] = useState({title:'',category:'',rule_type:'blacklist',notes:''});

  if (!user || !user.is_admin) return <div className="container" style={{paddingTop:100}}><div className="empty-state"><div className="empty-icon"><i className="ri-shield-star-line"></i></div><h3>{t('adminRequired')}</h3><button className="btn btn-primary" onClick={()=>navigate('/')} style={{marginTop:16}}>{t('goHome')}</button></div></div>;

  const load = () => {
    if (tab === 'stats') api.get('/api/admin/stats').then(setStats).catch(()=>{});
    if (tab === 'users') api.get('/api/admin/users').then(setUsers).catch(()=>{});
    if (tab === 'rules') api.get('/api/admin/content-rules').then(setRules).catch(()=>{});
    if (tab === 'pinned') api.get('/api/admin/pinned').then(setPinned).catch(()=>{});
    if (tab === 'settings') api.get('/api/admin/settings').then(setSettings).catch(()=>{});
  };
  useEffect(load, [tab]);

  const toggleBlock = async (uid, blocked) => {
    await api.request('PUT', `/api/admin/users/${uid}`, {is_blocked: !blocked});
    toast.addToast(blocked ? t('unblocked') : t('userBlocked'), 'info');
    load();
  };
  const toggleAdmin = async (uid, isAdmin) => {
    await api.request('PUT', `/api/admin/users/${uid}`, {is_admin: !isAdmin});
    toast.addToast(!isAdmin ? t('madeAdmin') : t('removedAdmin'), 'info');
    load();
  };
  const deleteRule = async (id) => { await api.del(`/api/admin/content-rules/${id}`); toast.addToast(t('deleted'), 'success'); load(); };
  const deletePinned = async (id) => { await api.del(`/api/admin/pinned/${id}`); toast.addToast(t('deleted'), 'success'); load(); };

  const addRule = async () => {
    if (!newRule.title && !newRule.category) return;
    await api.post('/api/admin/content-rules', newRule);
    setNewRule({title:'',category:'',rule_type:'blacklist',notes:''});
    toast.addToast(t('ruleAdded'), 'success');
    load();
  };

  const exportData = async (scope, fmt) => {
    try {
      const res = await fetch(`/api/admin/export?scope=${scope}&format=${fmt}`, {
        headers: { 'Authorization': `Bearer ${api.token}` }
      });
      if (!res.ok) throw new Error('Export failed');
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `admin_${scope}.${fmt}`;
      a.click();
      URL.revokeObjectURL(url);
    } catch(e) { toast.addToast('Export error', 'error'); }
  };

  return (
    <div className="container" style={{paddingTop:80}}>
      <div className="page-header"><div className="page-header-icon"><i className="ri-shield-star-line"></i><h1>{t('adminPanel')}</h1></div></div>
      <div className="tabs">
        {['stats','users','rules','pinned','settings','export'].map(tb => (
          <button key={tb} className={`tab ${tab===tb?'active':''}`} onClick={()=>setTab(tb)}>{t('admin'+tb[0].toUpperCase()+tb.slice(1))}</button>
        ))}
      </div>

      {tab === 'stats' && stats && (
        <>
          <div className="admin-grid">
            <div className="admin-stat"><CountUpNumber value={stats.users_total} className="stat-number" /><div className="stat-label">{t('users')}</div></div>
            <div className="admin-stat"><CountUpNumber value={stats.active_users_7d} className="stat-number" /><div className="stat-label">{t('activeIn7d')}</div></div>
            <div className="admin-stat"><CountUpNumber value={stats.queries_total} className="stat-number" /><div className="stat-label">{t('aiQueries')}</div></div>
            <div className="admin-stat"><CountUpNumber value={stats.feedback_total} className="stat-number" /><div className="stat-label">{t('feedbacks')}</div></div>
            <div className="admin-stat"><CountUpNumber value={stats.pinned_total_active} className="stat-number" /><div className="stat-label">{t('pinnedItems')}</div></div>
            <div className="admin-stat"><CountUpNumber value={stats.content_rules_total} className="stat-number" /><div className="stat-label">{t('rules')}</div></div>
          </div>
          {stats.top_queries?.length > 0 && <><h3 className="section-title">{t('topQueries')}</h3><div style={{marginBottom:24}}>{stats.top_queries.map((q,i) => <div key={i} style={{padding:'6px 0',fontSize:'.85rem',color:'var(--text-secondary)'}}>{q.query} — <strong>{q.count}</strong></div>)}</div></>}
        </>
      )}

      {tab === 'users' && (
        <table className="admin-table"><thead><tr><th>ID</th><th>{t('name')}</th><th>{t('admin')}</th><th>{t('blocked')}</th><th>{t('queries')}</th><th>{t('actions')}</th></tr></thead><tbody>
          {users.map(u => <tr key={u.id}><td>{u.id}</td><td>{u.username}</td><td className={u.is_admin?'admin-badge-yes':'admin-badge-no'}>{u.is_admin?t('yes'):t('no')}</td><td className={u.is_blocked?'admin-badge-no':''}>{u.is_blocked?t('yes'):t('no')}</td><td>{u.history_count} ({u.queries_today} {t('today')})</td><td className="admin-actions">
            <button className="btn btn-sm btn-secondary" onClick={()=>toggleAdmin(u.id, u.is_admin)} title={u.is_admin?t('removedAdmin'):t('madeAdmin')}><i className={u.is_admin?'ri-shield-line':'ri-shield-star-line'}></i></button>
            <button className="btn btn-sm btn-secondary" onClick={()=>toggleBlock(u.id, u.is_blocked)} title={u.is_blocked?t('unblocked'):t('userBlocked')}><i className={u.is_blocked?'ri-lock-unlock-line':'ri-lock-line'}></i></button>
          </td></tr>)}
        </tbody></table>
      )}

      {tab === 'rules' && (
        <>
          <div className="admin-form">
            <div className="admin-form-row">
              <input className="input" placeholder={t('title')} value={newRule.title} onChange={e=>setNewRule({...newRule,title:e.target.value})} />
              <input className="input" placeholder={t('category')} value={newRule.category} onChange={e=>setNewRule({...newRule,category:e.target.value})} />
              <select className="input" value={newRule.rule_type} onChange={e=>setNewRule({...newRule,rule_type:e.target.value})} style={{maxWidth:140}}><option value="blacklist">Blacklist</option><option value="whitelist">Whitelist</option></select>
              <button className="btn btn-primary" onClick={addRule}><i className="ri-add-line"></i></button>
            </div>
          </div>
          <table className="admin-table"><thead><tr><th>{t('title')}</th><th>{t('category')}</th><th>{t('type')}</th><th></th></tr></thead><tbody>
            {rules.map(r => <tr key={r.id}><td>{r.title||'—'}</td><td>{r.category||'—'}</td><td><span className={`badge ${r.rule_type==='blacklist'?'badge-accent':'badge-success'}`}>{r.rule_type}</span></td><td><button className="btn btn-sm btn-secondary" onClick={()=>deleteRule(r.id)}><i className="ri-delete-bin-line"></i></button></td></tr>)}
          </tbody></table>
        </>
      )}

      {tab === 'pinned' && (
        <div>{pinned.map(p => <div key={p.id} className="ai-rec-card" style={{marginBottom:12}}><div className="ai-rec-header"><div className="ai-rec-title">{p.title} {!p.is_active && <span className="badge badge-warning">inactive</span>}</div><div className="ai-rec-meta">{p.category} • {p.year_genre}</div></div><div className="ai-rec-desc">{p.description}</div><div style={{padding:'0 16px 12px'}}><button className="btn btn-sm btn-secondary" onClick={()=>deletePinned(p.id)}><i className="ri-delete-bin-line"></i> {t('remove')}</button></div></div>)}</div>
      )}

      {tab === 'settings' && settings && (
        <div className="admin-form">
          <label style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}><input type="checkbox" checked={settings.force_lite_mode} onChange={e=>{const v=e.target.checked; api.request('PUT','/api/admin/settings',{force_lite_mode:v}).then(()=>{setSettings({...settings,force_lite_mode:v}); toast.addToast(t('saved'),'success');})}} /> {t('forceLiteMode')}</label>
          <div style={{fontSize:'.85rem',color:'var(--text-secondary)'}}>{t('model')}: {settings.primary_model} / fallback: {settings.fallback_model}</div>
          <label style={{display:'flex',alignItems:'center',gap:10}}>{t('dailyLimit')}: <input className="input" type="number" min="1" value={settings.default_daily_limit} onChange={e=>setSettings({...settings,default_daily_limit:parseInt(e.target.value)||40})} style={{width:100}} /></label>
          <button className="btn btn-primary" onClick={()=>api.request('PUT','/api/admin/settings',{default_daily_limit:settings.default_daily_limit}).then(()=>toast.addToast(t('saved'),'success'))}>{t('save')}</button>
        </div>
      )}

      {tab === 'export' && (
        <div className="admin-grid">
          {['users','history','feedback','usage'].map(scope => (
            <div key={scope} className="admin-stat" style={{cursor:'pointer'}}>
              <div style={{marginBottom:8,textTransform:'capitalize',fontWeight:600}}>{scope}</div>
              <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                <button className="btn btn-sm btn-primary" onClick={()=>exportData(scope,'json')}>JSON</button>
                <button className="btn btn-sm btn-secondary" onClick={()=>exportData(scope,'csv')}>CSV</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
