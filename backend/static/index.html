/* ── Custom Cinema Player with HLS quality selection ── */
function CinemaPlayer({ hlsUrl }) {
  const videoRef = useRef(null);
  const hlsRef = useRef(null);
  const [playing, setPlaying] = useState(false);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const [volume, setVolume] = useState(1);
  const [muted, setMuted] = useState(false);
  const [quality, setQuality] = useState('Auto');
  const [qualities, setQualities] = useState([]);
  const [showQuality, setShowQuality] = useState(false);
  const [buffered, setBuffered] = useState(0);
  const [controlsVisible, setControlsVisible] = useState(true);
  const [videoLoading, setVideoLoading] = useState(true);
  const [hoverTime, setHoverTime] = useState(null);
  const [hoverX, setHoverX] = useState(0);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const hideTimer = useRef(null);
  const playerRef = useRef(null);

  useEffect(() => {
    if (!hlsUrl) return;
    const video = videoRef.current;
    if (!video) return;
    setVideoLoading(true);

    if (hlsUrl.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
      const hls = new Hls({ maxBufferLength: 30, maxMaxBufferLength: 60 });
      hls.loadSource(hlsUrl);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        const levels = hls.levels || [];
        const qs = levels.map((l, i) => ({ index: i, height: l.height, label: l.height + 'p' }));
        qs.sort((a, b) => b.height - a.height);
        setQualities([{ index: -1, height: 0, label: 'Auto' }, ...qs]);
        setQuality('Auto');
        setVideoLoading(false);
      });
      hls.on(Hls.Events.LEVEL_SWITCHED, (e, data) => {
        if (hls.autoLevelEnabled) {
          const h = hls.levels[data.level]?.height;
          setQuality(h ? h + 'p (auto)' : 'Auto');
        }
      });
      hls.on(Hls.Events.ERROR, () => setVideoLoading(false));
      hlsRef.current = hls;
    } else {
      video.src = hlsUrl;
      video.addEventListener('canplay', () => setVideoLoading(false), { once: true });
    }

    return () => { if (hlsRef.current) { hlsRef.current.destroy(); hlsRef.current = null; } };
  }, [hlsUrl]);

  const switchQuality = (q) => {
    if (!hlsRef.current) return;
    hlsRef.current.currentLevel = q.index;
    setQuality(q.index === -1 ? 'Auto' : q.label);
    setShowQuality(false);
  };

  const togglePlay = () => {
    const v = videoRef.current;
    if (!v) return;
    v.paused ? v.play().catch(()=>{}) : v.pause();
  };

  const seek = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (videoRef.current && duration) videoRef.current.currentTime = pct * duration;
  };

  const onProgressHover = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    setHoverX(e.clientX - rect.left);
    setHoverTime(duration ? pct * duration : null);
  };

  const toggleFullscreen = () => {
    const video = videoRef.current;
    const player = playerRef.current;
    if (!video) return;
    
    // Check if fullscreen is supported
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
    
    try {
      if (document.fullscreenElement) {
        document.exitFullscreen().catch(()=>{});
      } else {
        // On mobile, request fullscreen on video element
        // On desktop, request fullscreen on player container
        const target = isMobile ? video : player;
        if (target.requestFullscreen) {
          target.requestFullscreen().catch(err => {
            console.error('Fullscreen error:', err);
          });
        } else if (target.webkitRequestFullscreen) {
          target.webkitRequestFullscreen();
        } else if (target.webkitEnterFullscreen) {
          // iOS Safari
          target.webkitEnterFullscreen();
        } else if (target.msRequestFullscreen) {
          target.msRequestFullscreen();
        }
      }
    } catch (err) {
      console.error('Fullscreen error:', err);
    }
  };

  const fmtTime = (s) => {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
    const h = Math.floor(m / 60);
    if (h > 0) return `${h}:${String(m%60).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${m}:${String(sec).padStart(2,'0')}`;
  };

  const resetHideTimer = () => {
    setControlsVisible(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(() => { if (!videoRef.current?.paused) setControlsVisible(false); }, 3000);
  };

  // Keyboard shortcuts
  useEffect(() => {
    const onKey = (e) => {
      // Don't trigger shortcuts when typing in inputs
      const tag = document.activeElement?.tagName;
      if (['INPUT', 'TEXTAREA', 'SELECT'].includes(tag)) return;
      if (!playerRef.current?.contains(document.activeElement) && tag !== 'BODY') return;
      const v = videoRef.current;
      if (!v) return;
      switch(e.key) {
        case ' ': case 'k': e.preventDefault(); togglePlay(); break;
        case 'ArrowLeft': e.preventDefault(); v.currentTime = Math.max(0, v.currentTime - 10); resetHideTimer(); break;
        case 'ArrowRight': e.preventDefault(); v.currentTime = Math.min(v.duration||0, v.currentTime + 10); resetHideTimer(); break;
        case 'ArrowUp': e.preventDefault(); v.volume = Math.min(1, v.volume + .1); setVolume(v.volume); break;
        case 'ArrowDown': e.preventDefault(); v.volume = Math.max(0, v.volume - .1); setVolume(v.volume); break;
        case 'f': e.preventDefault(); toggleFullscreen(); break;
        case 'm': e.preventDefault(); v.muted = !v.muted; setMuted(v.muted); break;
      }
    };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [duration]);

  // Video events
  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    const onPlay = () => setPlaying(true);
    const onPause = () => { setPlaying(false); setControlsVisible(true); };
    const onTime = () => { setCurrentTime(v.currentTime); setDuration(v.duration || 0);
      if (v.buffered.length > 0) setBuffered(v.buffered.end(v.buffered.length - 1));
    };
    const onFS = () => setIsFullscreen(!!document.fullscreenElement);
    v.addEventListener('play', onPlay); v.addEventListener('pause', onPause);
    v.addEventListener('timeupdate', onTime); v.addEventListener('loadedmetadata', onTime);
    v.addEventListener('waiting', () => setVideoLoading(true));
    v.addEventListener('canplay', () => setVideoLoading(false));
    document.addEventListener('fullscreenchange', onFS);
    return () => { v.removeEventListener('play', onPlay); v.removeEventListener('pause', onPause);
      v.removeEventListener('timeupdate', onTime); v.removeEventListener('loadedmetadata', onTime);
      document.removeEventListener('fullscreenchange', onFS); };
  }, []);

  return (
    <div className={`cinema-player ${controlsVisible ? 'controls-visible' : ''}`} ref={playerRef} tabIndex={0}
      onMouseMove={resetHideTimer} onMouseLeave={() => { if (playing) setControlsVisible(false); }}
      onDoubleClick={(e) => { if (e.target === videoRef.current) toggleFullscreen(); }}
      onClick={(e) => { if (e.target === videoRef.current && e.detail === 1) { setTimeout(() => togglePlay(), 200); } }}>
      <video ref={videoRef} playsInline />
      {/* Center play button */}
      <div className={`cinema-center-play ${!playing && !videoLoading ? 'visible' : ''}`} onClick={togglePlay}>
        <i className="ri-play-fill"></i>
      </div>
      {/* Loading spinner */}
      {videoLoading && playing && <div className="cinema-loading-overlay"><div className="spinner"></div></div>}
      {/* Controls */}
      <div className="cinema-player-controls" onClick={(e) => e.stopPropagation()}>
        <div className="cinema-progress-wrap" onClick={seek} onMouseMove={onProgressHover} onMouseLeave={() => setHoverTime(null)}>
          <div className="cinema-progress-buffered" style={{width: duration ? (buffered/duration*100)+'%' : '0%'}} />
          <div className="cinema-progress-bar" style={{width: duration ? (currentTime/duration*100)+'%' : '0%'}} />
          {hoverTime !== null && <div className="cinema-progress-tooltip" style={{left: hoverX}}>{fmtTime(hoverTime)}</div>}
        </div>
        <button className="cinema-play-btn" onClick={togglePlay}><i className={playing ? 'ri-pause-fill' : 'ri-play-fill'}></i></button>
        <span className="cinema-time"><b>{fmtTime(currentTime)}</b> / {fmtTime(duration)}</span>
        <div className="cinema-volume-wrap">
          <button onClick={() => { const m = !muted; setMuted(m); if(videoRef.current) videoRef.current.muted = m; }}>
            <i className={muted || volume===0 ? 'ri-volume-mute-fill' : volume < .5 ? 'ri-volume-down-fill' : 'ri-volume-up-fill'}></i>
          </button>
          <input type="range" className="cinema-volume-slider" min="0" max="1" step="0.05" value={muted ? 0 : volume}
            onChange={e => { const v = parseFloat(e.target.value); setVolume(v); setMuted(v===0); if(videoRef.current) { videoRef.current.volume = v; videoRef.current.muted = v===0; } }} />
        </div>
        <div className="cinema-spacer" />
        {qualities.length > 1 && (
          <div className="cinema-quality-menu">
            {showQuality && (
              <div className="cinema-quality-dropdown">
                {qualities.map(q => <button key={q.label} className={q.label===quality || (q.index===-1 && quality.includes('auto'))?'active':''} onClick={() => switchQuality(q)}>{q.label}</button>)}
              </div>
            )}
            <button className="cinema-quality-btn" onClick={() => setShowQuality(!showQuality)}><i className="ri-settings-3-line"></i> {quality}</button>
          </div>
        )}
        <button className="cinema-fullscreen-btn" onClick={toggleFullscreen}><i className={isFullscreen ? 'ri-fullscreen-exit-line' : 'ri-fullscreen-line'}></i></button>
      </div>
    </div>
  );
}

function CinemaPage({ navigate }) {
  const { user } = useAuth();
  const { t } = useLang();
  const toast = useToast();
  const [view, setView] = useState('browse');
  const [categories, setCategories] = useState([]);
  const [activeCat, setActiveCat] = useState('films');
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(false);
  const [page, setPage] = useState(1);
  const [query, setQuery] = useState('');
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [voiceTracks, setVoiceTracks] = useState([]);
  const [activeTrack, setActiveTrack] = useState(null);
  const [streamsLoading, setStreamsLoading] = useState(false);
  // Season/episode state for series
  const [seasons, setSeasons] = useState([]);
  const [selectedSeason, setSelectedSeason] = useState(0);
  const [selectedEpisode, setSelectedEpisode] = useState(0);

  if (!user || !user.is_admin) return <div className="container" style={{paddingTop:100}}><div className="empty-state"><div className="empty-icon"><i className="ri-shield-star-line"></i></div><h3>{t('adminRequired')}</h3><button className="btn btn-primary" onClick={()=>navigate('/')} style={{marginTop:16}}>{t('goHome')}</button></div></div>;

  useEffect(() => {
    api.get('/api/hdrezka/categories').then(setCategories).catch(() => {});
  }, []);

  useEffect(() => {
    if (view !== 'browse') return;
    setLoading(true);
    api.get(`/api/hdrezka/browse?category=${activeCat}&page=${page}`)
      .then(d => { setItems(page === 1 ? d : [...items, ...d]); })
      .catch(() => toast.addToast('Failed to load', 'error'))
      .finally(() => setLoading(false));
  }, [activeCat, page, view]);

  const handleSearch = (e) => {
    e.preventDefault();
    if (!query.trim()) return;
    setView('search');
    setLoading(true);
    api.get('/api/hdrezka/search?q=' + encodeURIComponent(query.trim()))
      .then(d => setItems(d))
      .catch(() => toast.addToast('Search failed', 'error'))
      .finally(() => setLoading(false));
  };

  const loadStreams = (embedUrl) => {
    if (!embedUrl) return;
    setStreamsLoading(true);
    api.get('/api/hdrezka/streams?embed_url=' + encodeURIComponent(embedUrl))
      .then(r => {
        if (r.tracks && r.tracks.length > 0) {
          setVoiceTracks(r.tracks);
          setActiveTrack(r.tracks[0]);
        }
      })
      .catch(() => {})
      .finally(() => setStreamsLoading(false));
  };

  const openDetail = (url) => {
    setDetailLoading(true);
    setView('detail');
    setDetail(null);
    setVoiceTracks([]);
    setActiveTrack(null);
    setStreamsLoading(false);
    setSeasons([]);
    setSelectedSeason(0);
    setSelectedEpisode(0);
    api.get('/api/hdrezka/detail?url=' + encodeURIComponent(url))
      .then(d => {
        setDetail(d);
        // Load seasons for series
        if (d.content_type === 'series' || d.content_type === 'cartoon' || d.content_type === 'anime') {
          api.get('/api/hdrezka/seasons?url=' + encodeURIComponent(url))
            .then(s => {
              if (s.seasons && s.seasons.length > 0) {
                setSeasons(s.seasons);
                setSelectedSeason(0);
                setSelectedEpisode(0);
              }
            })
            .catch(() => {});
        }
        // Load streams
        if (d.player_url) {
          loadStreams(d.player_url);
        }
      })
      .catch(() => { toast.addToast('Failed to load details', 'error'); setView('browse'); })
      .finally(() => setDetailLoading(false));
  };

  const selectTrack = (track) => { setActiveTrack(track); };

  const handleSeasonChange = (seasonIdx) => {
    setSelectedSeason(seasonIdx);
    setSelectedEpisode(0);
    // Reload streams for first episode of new season
    if (seasons[seasonIdx] && seasons[seasonIdx].episodes && seasons[seasonIdx].episodes.length > 0) {
      const ep = seasons[seasonIdx].episodes[0];
      // For now, just reload with same embed (HDRezka handles season/episode via JS)
      if (detail && detail.player_url) {
        loadStreams(detail.player_url);
      }
    }
  };

  const handleEpisodeChange = (episodeIdx) => {
    setSelectedEpisode(episodeIdx);
    // Reload streams for selected episode
    if (detail && detail.player_url) {
      loadStreams(detail.player_url);
    }
  };

  const goBack = () => {
    setView('browse');
    setDetail(null);
    setVoiceTracks([]);
    setActiveTrack(null);
    setStreamsLoading(false);
    setSeasons([]);
    setSelectedSeason(0);
    setSelectedEpisode(0);
  };

  const changeCat = (cat) => { setActiveCat(cat); setPage(1); setItems([]); setView('browse'); };

  if (view === 'detail') {
    return (
      <div className="container" style={{paddingTop:80}}>
        <button className="btn-back" onClick={goBack} style={{marginBottom:20}}><i className="ri-arrow-left-line"></i> {t('back')}</button>
        {detailLoading ? <div className="loader"><div className="spinner"></div></div> : detail && (
          <div className="cinema-detail">
            <div className="cinema-poster">{detail.poster && <ProgressiveImg src={detail.poster} alt={detail.title} />}</div>
            <div className="cinema-info">
              <h2>{detail.title}</h2>
              {detail.original_title && <div className="original-title">{detail.original_title}</div>}
              <div className="cinema-meta">
                {detail.imdb_rating && <span className="cinema-meta-badge rating"><i className="ri-star-fill"></i> IMDb {detail.imdb_rating}</span>}
                {detail.kp_rating && <span className="cinema-meta-badge rating"><i className="ri-star-fill"></i> KP {detail.kp_rating}</span>}
                {detail.year && <span className="cinema-meta-badge"><i className="ri-calendar-line"></i> {detail.year}</span>}
                {detail.quality && <span className="cinema-meta-badge"><i className="ri-hd-line"></i> {detail.quality}</span>}
                {detail.duration && <span className="cinema-meta-badge"><i className="ri-time-line"></i> {detail.duration}</span>}

              <div className="cinema-player-section">
                <div className="cinema-player-header"><i className="ri-play-circle-fill"></i> Плеер</div>
                {/* Season selector */}
                {seasons.length > 1 && (
                  <div className="cinema-season-select" style={{marginBottom:12,display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:'.85rem',color:'var(--text-secondary)'}}><i className="ri-stack-line"></i> Сезон:</span>
                    {seasons.map((s, idx) => (
                      <button key={s.season} className={`cinema-season-btn ${selectedSeason === idx ? 'active' : ''}`}
                        onClick={() => handleSeasonChange(idx)}
                        style={{padding:'6px 14px',borderRadius:8,border:'1px solid var(--border-color)',background:selectedSeason === idx ? 'var(--accent-gradient)' : 'var(--bg-tertiary)',color:selectedSeason === idx ? '#fff' : 'var(--text-secondary)',cursor:'pointer',fontSize:'.85rem',transition:'all .2s'}}>
                        {s.name}
                      </button>
                    ))}
                  </div>
                )}
                {/* Episode selector */}
                {seasons.length > 0 && seasons[selectedSeason]?.episodes?.length > 1 && (
                  <div className="cinema-episode-select" style={{marginBottom:12,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',maxHeight:120,overflowY:'auto'}}>
                    <span style={{fontSize:'.85rem',color:'var(--text-secondary)'}}><i className="ri-list-check"></i> Серия:</span>
                    {seasons[selectedSeason].episodes.map((ep, idx) => (
                      <button key={ep.episode} className={`cinema-episode-btn ${selectedEpisode === idx ? 'active' : ''}`}
                        onClick={() => handleEpisodeChange(idx)}
                        style={{padding:'4px 10px',borderRadius:6,border:'1px solid var(--border-color)',background:selectedEpisode === idx ? 'var(--accent-primary)' : 'var(--bg-tertiary)',color:selectedEpisode === idx ? '#fff' : 'var(--text-secondary)',cursor:'pointer',fontSize:'.8rem',transition:'all .2s',minWidth:36}}>
                        {ep.episode}
                      </button>
                    ))}
                  </div>
                )}
                {/* Translator/voice selector */}
                {voiceTracks.length > 1 && (
                  <div className="cinema-translator-select">
                    {voiceTracks.map(tr => (
                      <button key={tr.voice_id} className={`cinema-translator-btn ${activeTrack?.voice_id === tr.voice_id ? 'active' : ''}`}
                        onClick={() => selectTrack(tr)}>
                        <i className="ri-translate-2"></i> {tr.title}
                        {tr.has_quality && <span className="hd-badge">HD</span>}
                      </button>
                    ))}
                  </div>
                )}
                {streamsLoading ? (
                  <div className="cinema-player"><div className="cinema-loading-player"><div className="spinner"></div></div></div>
                ) : activeTrack ? (
                  <CinemaPlayer key={activeTrack.voice_id + '-' + selectedSeason + '-' + selectedEpisode} hlsUrl={activeTrack.hls_url} />
                ) : detail.player_url ? (
                  <div className="cinema-no-player"><div className="cinema-no-player-icon"><i className="ri-loader-4-line"></i></div><p>Загрузка потоков...</p></div>
                ) : (
                  <div className="cinema-no-player"><div className="cinema-no-player-icon"><i className="ri-movie-2-line"></i></div><p>Плеер недоступен</p></div>
                )}
                {detail.source_url && (
                  <div style={{marginTop:12,textAlign:'center'}}>
                    <a href={detail.source_url} target="_blank" rel="noopener noreferrer" className="btn btn-secondary btn-sm"><i className="ri-external-link-line"></i> Открыть источник</a>
                  </div>
                )}
              </div>
            </div>
            {detail.related?.length > 0 && (
              <div className="cinema-related">
                <h3><i className="ri-movie-2-line"></i> Related</h3>
                <div className="cinema-grid">
                  {detail.related.map((r, i) => r.url && (
                    <div key={i} className="cinema-card" onClick={() => openDetail(r.url)}>
                      <div className="cinema-card-body"><div className="cinema-card-title">{r.title}</div></div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="container" style={{paddingTop:80}}>
      <div className="page-header">
        <div className="page-header-icon"><i className="ri-movie-2-line"></i><h1>Cinema</h1></div>
        <p style={{color:'var(--text-muted)',marginTop:4}}>HDRezka — Администрирование контента</p>
      </div>
      <form onSubmit={handleSearch} style={{display:'flex',gap:8,marginBottom:20}}>
        <input className="input" style={{flex:1}} placeholder="Поиск..." value={query} onChange={e => setQuery(e.target.value)} />
        <button className="btn btn-primary" type="submit"><i className="ri-search-line"></i> Search</button>
        {view === 'search' && <button className="btn btn-secondary" type="button" onClick={() => { setView('browse'); setPage(1); setItems([]); }}><i className="ri-arrow-left-line"></i> Browse</button>}

          const iconClass = c.id === 'films'
            ? 'ri-film-line'
            : c.id === 'series'
              ? 'ri-tv-2-line'

                ? 'ri-ghost-smile-line'
                : c.id === 'anime'
                  ? 'ri-gamepad-line'
                  : 'ri-film-line';
          return (

              onClick={() => changeCat(normalizedId)}>

            </button>
          );
        })}
      </div>
      {loading && items.length === 0 ? <div className="loader"><div className="spinner"></div></div> : (
        <>
          <div className="cinema-grid">
            {items.map((item, i) => (
              <RevealSection key={(item.id||'')+'-'+i} delay={Math.min(i,12)*40}>
                <div className="cinema-card" onClick={() => item.url && openDetail(item.url)}>
                  {item.image ? <img className="cinema-card-img" src={item.image} alt={item.title} loading="lazy" /> : <div className="cinema-card-img" style={{display:'flex',alignItems:'center',justifyContent:'center'}}><i className="ri-film-line" style={{fontSize:'2rem',color:'var(--text-muted)'}}></i></div>}
                  <div className="cinema-card-body">
                    <div className="cinema-card-title">{item.title}</div>
                    {item.type && <div className="cinema-card-type">{item.type}</div>}
                  </div>
                </div>
              </RevealSection>
            ))}
          </div>
          {items.length === 0 && !loading && <div className="empty-state"><div className="empty-icon"><i className="ri-film-line"></i></div><h3>No results</h3></div>}
          {view === 'browse' && items.length > 0 && (
            <div style={{textAlign:'center',marginTop:24}}>
              <button className="btn btn-secondary" onClick={() => setPage(p => p + 1)} disabled={loading}>
                {loading ? <><div className="spinner" style={{width:16,height:16}}></div> Loading...</> : <><i className="ri-arrow-down-line"></i> Load More</>}
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function NotFoundPage({ navigate }) {

  return (
    <div className="not-found fade-in">
      <div className="not-found-code float">404</div>

      <p>{t('pageNotFoundDesc')}</p>

// ==================== ACTIVITY PAGE ====================
function ActivityPage({ navigate }) {
  const { t } = useLang();
  const { user } = useAuth();
  const toast = useToast();
  const [activities, setActivities] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filter, setFilter] = useState('all');
  const [showAdd, setShowAdd] = useState(false);
  const [newTitle, setNewTitle] = useState('');
  const [newType, setNewType] = useState('movie');

  useEffect(() => {
    if (!user) return;
    apiFetch('/api/assistant/activity?limit=100').then(r => {
      if (Array.isArray(r)) setActivities(r);
      setLoading(false);
    });
  }, [user]);

  const addManual = () => {
    if (!newTitle.trim()) return;
    apiFetch('/api/assistant/activity', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ title: newTitle, item_type: newType, item_id: newTitle, action: 'watched' })
    }).then(r => {
      if (r.status === 'logged') {
        toast.addToast(t('consumed'), 'success');
        setNewTitle(''); setShowAdd(false);
        apiFetch('/api/assistant/activity?limit=100').then(r => { if(Array.isArray(r)) setActivities(r); });
      }
    });
  };

  const removeActivity = (a) => {
    apiFetch('/api/assistant/activity', {
      method: 'DELETE', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ item_type: a.item_type, item_id: a.item_id })
    }).then(() => setActivities(prev => prev.filter(x => x.id !== a.id)));
  };

  if (!user) return <div className="container"><div className="empty-state"><div className="empty-icon"><i className="ri-lock-line"></i></div><h3>{t('loginRequired')}</h3></div></div>;
  if (loading) return <div className="loader"><div className="spinner"></div></div>;

  const filtered = filter === 'all' ? activities : activities.filter(a => a.item_type === filter);
  const typeIcon = (t) => t==='movie'?'ri-film-line':t==='book'?'ri-book-2-line':t==='music'?'ri-music-2-line':'ri-gamepad-line';

  return (
    <div className="container fade-in">
      <div className="page-header">
        <div className="page-header-icon"><i className="ri-check-double-line"></i><h1>{t('activityLog')}</h1></div>
        <p style={{color:'var(--text-secondary)'}}>{activities.length} {t('consumedItems')}</p>
      </div>
      <div style={{display:'flex',gap:12,marginBottom:24,flexWrap:'wrap',alignItems:'center'}}>
        <div className="tabs" style={{marginBottom:0,flex:1}}>
          {['all','movie','book','music'].map(f => (
            <button key={f} className={`tab ${filter===f?'active':''}`} onClick={()=>setFilter(f)}>
              {f==='all' ? t('all') : f==='movie' ? t('movies') : f==='book' ? t('books') : t('music')}
            </button>
          ))}
        </div>
        <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(!showAdd)}><i className="ri-add-line"></i> {t('addActivity')}</button>
      </div>
      {showAdd && (
        <div className="admin-form fade-in" style={{marginBottom:20}}>
          <div className="admin-form-row">
            <select className="input" value={newType} onChange={e=>setNewType(e.target.value)} style={{maxWidth:160}}>
              <option value="movie">{t('movies')}</option>
              <option value="book">{t('books')}</option>
              <option value="music">{t('music')}</option>
            </select>
            <input className="input" placeholder={t('markConsumed')} value={newTitle} onChange={e=>setNewTitle(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addManual()} />
            <button className="btn btn-primary" onClick={addManual}><i className="ri-check-line"></i></button>
          </div>
        </div>
      )}
      {filtered.length === 0 ? (
        <div className="empty-state"><div className="empty-icon"><i className="ri-check-double-line"></i></div><h3>{t('noHistory')}</h3><p>{t('noHistoryDesc')}</p></div>
      ) : (
        <div className="activity-list">
          {filtered.map((a, i) => (
            <div key={a.id} className="activity-item fade-in" style={{animationDelay:`${i*0.04}s`}}>
              <div className="activity-item-icon"><i className={typeIcon(a.item_type)}></i></div>
              <div className="activity-item-info">
                <div className="activity-item-title">{a.title}</div>
                <div className="activity-item-meta">{a.item_type} • {new Date(a.consumed_at).toLocaleDateString()}</div>
              </div>
              <button className="btn btn-sm btn-secondary" onClick={()=>removeActivity(a)} title={t('remove')}><i className="ri-delete-bin-line"></i></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ==================== WEEKLY RECAP PAGE ====================
function WeeklyRecapPage({ navigate }) {
  const { t } = useLang();
  const { user } = useAuth();
  const [recap, setRecap] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!user) return;
    apiFetch('/api/assistant/weekly-recap').then(r => {
      if (r && !r.error) setRecap(r);
      setLoading(false);
    });
  }, [user]);

  if (!user) return <div className="container"><div className="empty-state"><div className="empty-icon"><i className="ri-lock-line"></i></div><h3>{t('loginRequired')}</h3></div></div>;
  if (loading) return <div className="loader"><div className="spinner"></div></div>;
  if (!recap) return <div className="container"><div className="empty-state"><h3>Error loading recap</h3></div></div>;

  const trendIcon = recap.trend === 'up' ? 'ri-arrow-up-line' : recap.trend === 'down' ? 'ri-arrow-down-line' : 'ri-equal-line';
  const trendColor = recap.trend === 'up' ? 'var(--success)' : recap.trend === 'down' ? 'var(--error)' : 'var(--text-muted)';
  const trendText = recap.trend === 'up' ? t('trendUp') : recap.trend === 'down' ? t('trendDown') : t('trendSame');
  const typeIcon = (tp) => tp==='movie'?'ri-film-line':tp==='book'?'ri-book-2-line':tp==='music'?'ri-music-2-line':'ri-gamepad-line';

  return (
    <div className="container fade-in">
      <div className="page-header">
        <div className="page-header-icon"><i className="ri-bar-chart-box-line"></i><h1>{t('weeklyRecap')}</h1></div>
        <p style={{color:'var(--text-secondary)'}}>{t('weeklyRecapDesc')}</p>
      </div>

      <div className="recap-summary">
        <RevealSection className="recap-main-card">
          <CountUpNumber value={recap.total_consumed} className="recap-big-num" />
          <div className="recap-big-label">{t('consumedItems')} {t('thisWeek').toLowerCase()}</div>
          <div className="recap-trend" style={{color:trendColor}}>
            <i className={trendIcon}></i> {trendText} ({recap.prev_week_count} {t('vsLastWeek').toLowerCase()})
          </div>
        </RevealSection>
        <div className="recap-stats-row">
          <RevealSection className="recap-stat"><CountUpNumber value={recap.ai_queries} className="recap-stat-num" /><div className="recap-stat-label">{t('aiInteractions')}</div></RevealSection>
          <RevealSection className="recap-stat" delay={80}><CountUpNumber value={recap.new_favorites} className="recap-stat-num" /><div className="recap-stat-label">{t('favorites')}</div></RevealSection>
          <RevealSection className="recap-stat" delay={160}><CountUpNumber value={recap.new_ratings} className="recap-stat-num" /><div className="recap-stat-label">{t('ratings')}</div></RevealSection>
        </div>
      </div>

      {Object.keys(recap.by_type).length > 0 && (
        <div style={{marginBottom:32}}>
          <h3 className="section-title">{t('categories')}</h3>
          <div className="recap-types">
            {Object.entries(recap.by_type).map(([tp, cnt]) => (
              <div key={tp} className="recap-type-card">
                <i className={typeIcon(tp)} style={{fontSize:'1.5rem',color:'var(--accent-primary)'}}></i>
                <span className="recap-type-num">{cnt}</span>
                <span className="recap-type-label">{tp}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {recap.activities.length > 0 && (
        <div>
          <h3 className="section-title">{t('activityLog')}</h3>
          <div className="activity-list">
            {recap.activities.map((a, i) => (
              <div key={a.id} className="activity-item fade-in" style={{animationDelay:`${i*0.04}s`}}>
                <div className="activity-item-icon"><i className={typeIcon(a.item_type)}></i></div>
                <div className="activity-item-info">
                  <div className="activity-item-title">{a.title}</div>
                  <div className="activity-item-meta">{a.item_type} • {new Date(a.consumed_at).toLocaleDateString()}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {recap.total_consumed === 0 && (
        <div className="empty-state">
          <div className="empty-icon"><i className="ri-bar-chart-box-line"></i></div>
          <h3>{t('noHistory')}</h3>
          <p>{t('noHistoryDesc')}</p>
          <button className="btn btn-primary" onClick={()=>navigate('/ai')} style={{marginTop:16}}><i className="ri-sparkling-2-fill"></i> {t('aiAssistant')}</button>
        </div>
      )}
    </div>
  );
}

// ==================== MAIN APP ====================
function GlobalPlayerBar() {
  const ctx = useMusicPlayer();
  if (!ctx || !ctx.playingTrack) return null;
  const { playingTrack, playingIdx, tracks, playing, isPlaying, progress, currentTime, duration, volume, seekTo, changeVolume, playPrev, playNext, audioRef, setIsPlaying } = ctx;
  const fmtTime = (s) => { if (!s || isNaN(s)) return '0:00'; const m = Math.floor(s/60); return `${m}:${String(Math.floor(s%60)).padStart(2,'0')}`; };
  return (
    <div className="player-bar">
      <div className="player-progress-top" onClick={seekTo}>
        <div className="player-progress-fill" style={{width:progress+'%'}}></div>
      </div>
      <div className="player-content">
        <div className="player-left">
          {playingTrack.cover ? <img className="player-cover" src={playingTrack.cover} alt="" /> : <div className="music-icon" style={{width:48,height:48,borderRadius:8}}><i className="ri-music-2-fill"></i></div>}
          <div className="player-info"><span className="player-title">{playingTrack.title}</span><span className="player-artist">{playingTrack.artist}</span></div>
        </div>
        <div className="player-center">
          <div className="player-controls">
            <button className="player-btn" onClick={(e)=>{e.stopPropagation();playPrev()}} disabled={playingIdx<=0}><i className="ri-skip-back-fill"></i></button>
            <button className="player-btn-main" onClick={(e)=>{e.stopPropagation(); if(isPlaying){audioRef.current.pause();setIsPlaying(false)}else{audioRef.current.play();setIsPlaying(true)}}}><i className={isPlaying?'ri-pause-fill':'ri-play-fill'}></i></button>
            <button className="player-btn" onClick={(e)=>{e.stopPropagation();playNext()}} disabled={playingIdx>=tracks.length-1}><i className="ri-skip-forward-fill"></i></button>
          </div>
          <div className="player-time">{fmtTime(currentTime)} / {fmtTime(duration)}</div>
        </div>
        <div className="player-right">
          <i className="ri-volume-up-line" style={{color:'var(--text-muted)',fontSize:'.9rem'}}></i>
          <input type="range" className="player-volume" min="0" max="1" step="0.05" value={volume} onChange={e=>changeVolume(e.target.value)} />
          {playingTrack.link && <a href={playingTrack.link} target="_blank" rel="noopener noreferrer" className="player-btn" title="Deezer" onClick={e=>e.stopPropagation()}><i className="ri-external-link-line"></i></a>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const { path, navigate, goBack } = useRouter();
  const { user, loading } = useAuth();
  const { t } = useLang();
  const [showOnboarding, setShowOnboarding] = useState(false);

  useEffect(() => {
    if (user) {
      api.get('/api/ai/onboarding/status').then(res => {
        if (!res.completed) setShowOnboarding(true);
      }).catch(()=>{});
    }
  }, [user]);

  if (loading) return <div className="loader" style={{paddingTop:'40vh'}}><div className="spinner"></div></div>;

  const basePath = path.split('?')[0];
  let page;
  if (basePath === '/' || basePath === '') page = <HomePage navigate={navigate} />;
  else if (basePath === '/movies' || path.startsWith('/movies?')) page = <MoviesPage navigate={navigate} />;
  else if (basePath.startsWith('/movies/')) page = <DetailPage navigate={navigate} goBack={goBack} type="movie" id={basePath.split('/movies/')[1]} />;
  else if (basePath === '/books') page = <BooksPage navigate={navigate} />;
  else if (basePath.startsWith('/books/')) page = <DetailPage navigate={navigate} goBack={goBack} type="book" id={basePath.split('/books/')[1]} />;
  else if (basePath === '/music') page = <MusicPage />;
  else if (basePath === '/events') page = <EventsPage />;
  else if (basePath === '/ai') page = <AiChatPage navigate={navigate} />;
  else if (basePath === '/ai/history') page = <AiHistoryPage navigate={navigate} />;
  else if (basePath === '/admin') page = <AdminPage navigate={navigate} />;
  else if (basePath === '/cinema') page = <CinemaPage navigate={navigate} />;
  else if (basePath === '/profile') page = <ProfilePage navigate={navigate} />;
  else if (basePath === '/activity') page = <ActivityPage navigate={navigate} />;
  else if (basePath === '/weekly-recap') page = <WeeklyRecapPage navigate={navigate} />;
  else if (basePath === '/login') page = <LoginPage navigate={navigate} />;
  else if (basePath === '/register') page = <RegisterPage navigate={navigate} />;
  else page = <NotFoundPage navigate={navigate} />;

  return (
    <div className="layout">
      <a href="#main-content" className="skip-link">Skip to content</a>
      <Navbar navigate={navigate} currentPath={basePath} />
      <ScrollProgressBar />
      <CursorGlow />
      <main className="main-content" id="main-content" role="main"><div className="page-transition" key={basePath}>{page}</div></main>
      <footer className="footer" role="contentinfo">
        <div className="container">
          <div className="footer-inner">
            <div className="footer-brand">
              <span className="footer-logo">Pulse</span>
              <p className="footer-desc">{t('footerAbout')}</p>
            </div>
            <div className="footer-col">
              <h4>{t('navigation')}</h4>
              <div className="footer-col-links">
                <span onClick={()=>navigate('/')}><i className="ri-home-4-line"></i> {t('home')}</span>
                <span onClick={()=>navigate('/ai')}><i className="ri-robot-2-line"></i> {t('aiAssistant')}</span>
                <span onClick={()=>navigate('/ai/history')}><i className="ri-history-line"></i> {t('aiHistory')}</span>
                <span onClick={()=>navigate('/activity')}><i className="ri-check-double-line"></i> {t('activityLog')}</span>
                <span onClick={()=>navigate('/weekly-recap')}><i className="ri-bar-chart-box-line"></i> {t('weeklyRecap')}</span>
                <span onClick={()=>navigate('/profile')}><i className="ri-user-line"></i> {t('profile')}</span>
              </div>
            </div>
            <div className="footer-col">
              <h4>{t('categories')}</h4>
              <div className="footer-col-links">
                <span onClick={()=>navigate('/movies')}><i className="ri-film-line"></i> {t('movies')}</span>
                <span onClick={()=>navigate('/books')}><i className="ri-book-2-line"></i> {t('books')}</span>
                <span onClick={()=>navigate('/music')}><i className="ri-music-2-line"></i> {t('music')}</span>
                <span onClick={()=>navigate('/events')}><i className="ri-calendar-event-line"></i> {t('events')}</span>
              </div>
            </div>
            <div className="footer-col">
              <h4>{t('technologies')}</h4>
              <div className="footer-col-links">
                <span><i className="ri-reactjs-line"></i> React 18</span>
                <span><i className="ri-flask-line"></i> Flask + Python</span>
                <span><i className="ri-database-2-line"></i> SQLite</span>
                <span><i className="ri-movie-2-line"></i> Kinopoisk API</span>
                <span><i className="ri-book-open-line"></i> Google Books API</span>
                <span><i className="ri-music-2-line"></i> {t('deezerApi')}</span>
                <span><i className="ri-robot-2-line"></i> Gemini AI</span>
              </div>
            </div>
          </div>
          <div className="footer-bottom">
            <div className="footer-copy"><i className="ri-copyright-line"></i> {t('footerCopy')}</div>
            <div className="footer-tech">
              <span className="footer-tech-badge"><i className="ri-reactjs-line"></i> React 18</span>
              <span className="footer-tech-badge"><i className="ri-flask-line"></i> Flask</span>
              <span className="footer-tech-badge"><i className="ri-database-2-line"></i> SQLite</span>
              <span className="footer-tech-badge"><i className="ri-music-2-line"></i> Deezer</span>
              <span className="footer-tech-badge"><i className="ri-robot-2-line"></i> Gemini</span>
            </div>
          </div>
        </div>
      </footer>
      <PwaInstallBanner />
      {showOnboarding && <OnboardingModal onClose={()=>setShowOnboarding(false)} />}
      {user && basePath !== '/ai' && <FloatingAiBtn navigate={navigate} />}
      <ScrollTopBtn />
      <BottomNav navigate={navigate} currentPath={basePath} />
      <GlobalPlayerBar />
    </div>
  );
}
