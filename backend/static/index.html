<html lang="ru">
<head>
    <meta charset="UTF-8">

    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>Pulse — Пульс развлечений</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='50' x2='100' y2='50' gradientUnits='userSpaceOnUse'><stop stop-color='%234facfe'/><stop offset='.5' stop-color='%237c3aed'/><stop offset='1' stop-color='%23e94560'/></linearGradient></defs><path d='M5 50h15l8-30 12 60 10-45 7 22h15l9-25 7 18h7' stroke='url(%23g)' stroke-width='7' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
    <style>
:root {
  --bg-primary: #05070d;
  --bg-secondary: #0c0f18;
  --bg-tertiary: rgba(15,18,28,.75);
  --bg-card: rgba(12,15,24,.9);
  --bg-card-solid: #0e1119;
  --bg-hover: #151927;
  --bg-input: #0d1017;
  --bg-glass: rgba(12,15,24,.65);
  --text-primary: #e8ecf4;
  --text-secondary: #7b83a0;
  --text-muted: #454d6a;
  --accent-primary: #00d4ff;
  --accent-secondary: #7c3aed;
  --accent: #00d4ff;
  --accent-gradient: linear-gradient(135deg, #00d4ff 0%, #7c3aed 50%, #e94560 100%);
  --accent-glow: rgba(0,212,255,.12);
  --border-color: rgba(0,212,255,.06);
  --border-hover: rgba(0,212,255,.15);
  --border: rgba(0,212,255,.12);
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f43f5e;
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 28px;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
  --shadow-lg: 0 12px 48px rgba(0,0,0,.5);
  --shadow-glow: 0 0 40px rgba(0,212,255,.06);
  --transition: background-color 0.25s cubic-bezier(.4,0,.2,1), color 0.25s cubic-bezier(.4,0,.2,1), border-color 0.25s cubic-bezier(.4,0,.2,1), box-shadow 0.25s cubic-bezier(.4,0,.2,1), transform 0.25s cubic-bezier(.4,0,.2,1);
  --ease-spring: cubic-bezier(.2,.8,.2,1.2);
  --pulse-cyan: #00d4ff;
  --pulse-purple: #7c3aed;
  --pulse-pink: #e94560;
}
.skip-link{position:absolute;top:-100%;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:12px 24px;z-index:10000;border-radius:0 0 8px 8px;font-weight:600;transition:top .2s}.skip-link:focus{top:0}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.04),transparent),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(124,58,237,.04),transparent),radial-gradient(ellipse 40% 30% at 10% 60%,rgba(0,212,255,.02),transparent);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.02) 1px,transparent 1px);background-size:4px 4px;pointer-events:none;z-index:0}
a{color:var(--accent-primary);text-decoration:none;transition:var(--transition)}
a:hover{color:#33dfff}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,212,255,.4)}
::selection{background:rgba(0,212,255,.25);color:#fff}
.container{max-width:1400px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.section-title{font-size:1.4rem;font-weight:700;margin-bottom:20px;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.grid-lg{grid-template-columns:repeat(auto-fill,minmax(350px,1fr))}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 22px;border:none;border-radius:var(--radius-sm);font-size:.875rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit;position:relative;overflow:hidden;letter-spacing:.01em}
.btn-primary{background:var(--accent-gradient);color:#fff;box-shadow:0 2px 16px rgba(0,212,255,.2)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(0,212,255,.3),0 0 12px rgba(0,212,255,.15)}
.btn-primary:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,212,255,.2)}
.btn-secondary{background:rgba(255,255,255,.04);color:var(--text-primary);border:1px solid var(--border-color);backdrop-filter:blur(12px)}
.btn-secondary:hover{background:rgba(255,255,255,.08);border-color:var(--border-hover)}
.btn-success{background:linear-gradient(135deg,#34d399,#059669);color:#fff;box-shadow:0 2px 12px rgba(52,211,153,.2)}
.btn-sm{padding:6px 14px;font-size:.8rem}
.btn-icon{width:40px;height:40px;padding:0;border-radius:50%;font-size:1.1rem}
.btn-full{width:100%;padding:14px;font-size:1rem;margin-top:4px;border-radius:var(--radius-md)}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(255,255,255,.04);backdrop-filter:blur(12px);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-secondary);font-size:.85rem;font-weight:500;cursor:pointer;transition:var(--transition);margin-bottom:20px;font-family:inherit}
.btn-back:hover{color:var(--text-primary);background:rgba(255,255,255,.08);border-color:var(--border-hover)}
.input{width:100%;padding:12px 16px;background:rgba(255,255,255,.04);border:1px solid var(--border-color);border-radius:var(--radius-sm);color:var(--text-primary);font-size:.95rem;font-family:inherit;transition:var(--transition);outline:none;backdrop-filter:blur(8px)}
.input:focus{border-color:rgba(0,212,255,.35);box-shadow:0 0 0 3px rgba(0,212,255,.06),0 0 20px rgba(0,212,255,.04)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:.75rem;font-weight:600;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.06);letter-spacing:.02em}
.badge-accent{background:rgba(0,212,255,.08);color:var(--pulse-cyan);border-color:rgba(0,212,255,.12)}
.badge-success{background:rgba(52,211,153,.1);color:var(--success);border-color:rgba(52,211,153,.15)}
.badge-warning{background:rgba(251,191,36,.1);color:var(--warning);border-color:rgba(251,191,36,.15)}
.rating-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(251,191,36,.12);color:var(--warning);border-radius:8px;font-size:.8rem;font-weight:700;border:1px solid rgba(251,191,36,.1);backdrop-filter:blur(8px)}
.loader{display:flex;justify-content:center;align-items:center;padding:80px 20px;flex-direction:column;gap:16px}
.spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.06);border-top-color:var(--accent-primary);border-right-color:var(--accent-secondary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-secondary)}
.empty-state .empty-icon{font-size:3.5rem;margin-bottom:20px;opacity:.4;filter:grayscale(.3)}
.empty-state h3{font-size:1.25rem;font-weight:700;margin-bottom:10px;color:var(--text-primary)}
.empty-state p{font-size:.9rem;color:var(--text-muted);max-width:420px;margin:0 auto;line-height:1.6}
.tabs{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.03);border:1px solid var(--border-color);border-radius:var(--radius-md);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;backdrop-filter:blur(12px)}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 20px;border:none;background:none;color:var(--text-secondary);font-size:.85rem;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);transition:var(--transition);white-space:nowrap;font-family:inherit;position:relative}
.tab:hover{color:var(--text-primary);background:rgba(255,255,255,.05)}
.tab.active{background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(124,58,237,.15));color:var(--pulse-cyan);border:1px solid rgba(0,212,255,.2);box-shadow:0 0 16px rgba(0,212,255,.1)}
.carousel{display:flex;gap:18px;overflow-x:auto;padding-bottom:16px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.carousel::-webkit-scrollbar{display:none}
.carousel>*{scroll-snap-align:start;flex-shrink:0}
.search-bar{display:flex;gap:12px;margin-bottom:24px}
.search-bar .input{flex:1}
.page-header{margin-bottom:32px}
.page-header h1{font-size:2rem;font-weight:800;margin-bottom:8px}
.page-header p{color:var(--text-secondary);font-size:1rem}

/* Fade-in animation */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-in-up{animation:fadeInUp .5s ease-out both}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.scale-in{animation:scaleIn .3s ease-out both}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px rgba(0,212,255,.2)}50%{box-shadow:0 0 20px rgba(0,212,255,.4)}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes bounceIn{0%{opacity:0;transform:scale(.3)}50%{opacity:1;transform:scale(1.05)}70%{transform:scale(.95)}100%{transform:scale(1)}}
@keyframes ripple{0%{transform:scale(0);opacity:.6}100%{transform:scale(4);opacity:0}}
@keyframes slideInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes rotateIn{from{opacity:0;transform:rotate(-10deg) scale(.9)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes equalizer{0%,100%{height:10%}50%{height:80%}}
.bounce-in{animation:bounceIn .5s ease-out both}
.float{animation:float 3s ease-in-out infinite}
.pulse{animation:pulse 2s ease-in-out infinite}
.gradient-animate{background-size:200% 200%;animation:gradientShift 3s ease infinite}

/* Ripple effect for buttons */
.btn-ripple{position:relative;overflow:hidden}
.btn-ripple::after{content:'';position:absolute;width:100%;height:100%;top:0;left:0;pointer-events:none;background-image:radial-gradient(circle,rgba(255,255,255,.3) 10%,transparent 10%);background-repeat:no-repeat;background-position:50%;transform:scale(10);opacity:0;transition:transform .5s,opacity .8s}
.btn-ripple:active::after{transform:scale(0);opacity:.3;transition:0s}

/* Icon nav link style */
.nav-link i{font-size:1.1rem;vertical-align:middle;margin-right:2px}
.nav-link-icon{display:flex;align-items:center;gap:6px}

/* Card hover glow */
.card:hover{box-shadow:0 8px 40px rgba(0,212,255,.1),var(--shadow-lg)}
.card-overlay-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:48px;height:48px;border-radius:50%;background:rgba(0,212,255,.85);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.3rem;transition:all .3s ease;opacity:0}
.card:hover .card-overlay-icon{transform:translate(-50%,-50%) scale(1);opacity:1}

/* Music equalizer animation */
.equalizer{display:flex;align-items:flex-end;gap:2px;height:16px}
.equalizer-bar{width:3px;background:var(--accent-primary);border-radius:1px;animation:equalizer .8s ease-in-out infinite}
.equalizer-bar:nth-child(1){animation-delay:0s;height:60%}
.equalizer-bar:nth-child(2){animation-delay:.15s;height:80%}
.equalizer-bar:nth-child(3){animation-delay:.3s;height:40%}
.equalizer-bar:nth-child(4){animation-delay:.45s;height:70%}

/* Improved search bar */
.search-bar-wrap{position:relative}
.search-bar-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1.1rem;pointer-events:none;z-index:1}
.search-bar-wrap .input{padding-left:44px}

/* Page header with icon */
.page-header-icon{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.page-header-icon i{font-size:2.2rem;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Event meta icons */
.event-meta-item i{font-size:1rem;color:var(--accent-primary);min-width:18px}

/* Auth form icons */
.form-input-wrap{position:relative}
.form-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:1rem}
.form-input-wrap .input{padding-left:40px}

/* Stat card hover */
.stat-card{position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(0,212,255,.05) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.stat-card:hover::before{opacity:1}

/* Footer col icons */
.footer-col-links span i{margin-right:6px;font-size:.9rem}

/* Toast icons improved */
.toast-icon-wrap{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast-success .toast-icon-wrap{background:rgba(78,204,163,.15);color:var(--success)}
.toast-error .toast-icon-wrap{background:rgba(0,212,255,.15);color:var(--error)}
.toast-info .toast-icon-wrap{background:rgba(83,52,131,.15);color:var(--accent-secondary)}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-hover) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{border-radius:var(--radius-md);overflow:hidden}
.skeleton-card .skeleton-img{width:100%;padding-top:150%;background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-hover) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite}
.skeleton-card .skeleton-text{padding:12px}
.skeleton-card .skeleton-line{height:14px;margin-bottom:8px;border-radius:4px}
.skeleton-card .skeleton-line:last-child{width:60%;margin-bottom:0}

/* Toast notifications */
.toast-container{position:fixed;top:80px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:14px 20px;border-radius:var(--radius-md);background:var(--bg-card);border:1px solid var(--border-color);box-shadow:var(--shadow-lg);backdrop-filter:blur(20px);animation:toastIn .3s ease-out;pointer-events:auto;min-width:280px;max-width:400px}
.toast-success{border-color:rgba(78,204,163,.3);background:rgba(22,33,62,.95)}
.toast-error{border-color:rgba(0,212,255,.3);background:rgba(22,33,62,.95)}
.toast-info{border-color:rgba(83,52,131,.3);background:rgba(22,33,62,.95)}
.toast-icon{font-size:1.2rem;flex-shrink:0}
.toast-msg{font-size:.85rem;font-weight:500;color:var(--text-primary)}
.toast-close{margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;padding:0 4px;flex-shrink:0}
.toast-close:hover{color:var(--text-primary)}
.toast.removing{animation:toastOut .3s ease-in forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(100px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(100px)}}

/* Navbar */
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,7,13,.92);backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);border-bottom:1px solid rgba(0,212,255,.08);height:64px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.navbar.scrolled{box-shadow:0 4px 40px rgba(0,0,0,.5),0 1px 0 rgba(0,212,255,.08);background:rgba(5,7,13,.97);border-bottom-color:rgba(0,212,255,.12)}
.navbar-inner{display:flex;align-items:center;height:100%;gap:24px}
.navbar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;cursor:pointer}
.brand-icon{width:38px;height:38px;border-radius:11px;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:all .3s;font-weight:800;font-size:1.1rem;color:#fff}
.brand-icon img{width:100%;height:100%;object-fit:cover}
.brand-icon.has-logo{background:none}
.navbar-brand:hover .brand-icon{transform:rotate(-8deg) scale(1.08)}
.brand-text{font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--pulse-cyan),var(--pulse-purple),var(--pulse-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.brand-pulse{display:flex;align-items:center;gap:2px;margin-left:-2px}
.brand-pulse svg{height:20px;width:32px}
.navbar-links{display:flex;gap:2px}
.nav-link{padding:8px 14px;color:var(--text-secondary);text-decoration:none;font-size:.875rem;font-weight:500;border-radius:var(--radius-sm);transition:var(--transition);cursor:pointer;position:relative}
.nav-link:hover{color:var(--text-primary);background:rgba(0,212,255,.04)}
.nav-link.active{color:var(--pulse-cyan);background:rgba(0,212,255,.06)}
.nav-link.active::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:16px;height:2px;background:linear-gradient(90deg,var(--pulse-cyan),var(--pulse-purple));border-radius:1px;box-shadow:0 0 8px rgba(0,212,255,.4)}
.navbar-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.navbar-search-form{position:relative}
.search-input{width:180px;padding:8px 14px;background:rgba(255,255,255,.04);border:1px solid var(--border-color);border-radius:var(--radius-lg);color:var(--text-primary);font-size:.85rem;outline:none;transition:var(--transition);font-family:inherit;backdrop-filter:blur(8px)}
.search-input:focus{width:240px;border-color:rgba(0,212,255,.4);background:rgba(255,255,255,.06);box-shadow:0 0 0 3px rgba(0,212,255,.06)}
.search-input::placeholder{color:var(--text-muted)}
.navbar-user{display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;transition:all .2s;box-shadow:0 2px 8px rgba(0,212,255,.2)}
.user-avatar:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,212,255,.35)}
.user-name{font-size:.875rem;color:var(--text-primary);font-weight:500}
.navbar-auth{display:flex;gap:8px}

/* Mobile menu */
.mobile-menu-btn{display:none;width:40px;height:40px;background:rgba(255,255,255,.04);border:1px solid var(--border-color);border-radius:var(--radius-sm);cursor:pointer;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:8px;transition:var(--transition)}
.mobile-menu-btn:hover{background:rgba(255,255,255,.08);border-color:var(--border-hover)}
.mobile-menu-btn span{display:block;width:20px;height:2px;background:var(--text-primary);border-radius:2px;transition:var(--transition)}
.mobile-menu-btn.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.mobile-menu-btn.open span:nth-child(2){opacity:0}
.mobile-menu-btn.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;max-height:calc(100vh - 64px);overflow-y:auto;background:rgba(8,9,14,.97);backdrop-filter:blur(24px) saturate(1.4);-webkit-backdrop-filter:blur(24px) saturate(1.4);border-bottom:1px solid var(--border-color);padding:16px;z-index:99;animation:fadeIn .2s ease-out;box-shadow:0 16px 48px rgba(0,0,0,.5);overflow:visible}
.mobile-menu.open{display:block}
.mobile-menu-links{display:flex;flex-direction:column;gap:4px}
.mobile-menu-links .nav-link{display:block;padding:14px 16px;font-size:1rem;border-radius:var(--radius-sm);margin-bottom:2px}
.mobile-menu-links .nav-link i{margin-right:8px;min-width:20px}
.mobile-menu-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border-color);align-items:center;justify-content:center}
.mobile-menu-actions .btn{flex:1;min-width:120px;white-space:nowrap}
.mobile-menu-actions .lang-switch{flex:0 0 auto;justify-content:center}

/* Mobile theme switcher - inline grid */
.theme-switcher-mobile{display:flex;flex-direction:column;gap:8px;flex:1;min-width:100%}
.theme-switcher-mobile .btn{width:100%;justify-content:center}
.theme-grid-mobile{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;padding:8px;background:var(--bg-secondary);border-radius:var(--radius-sm);border:1px solid var(--border-color)}
.theme-opt-mobile{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--bg-card);border:1px solid var(--border-color);color:var(--text-secondary);cursor:pointer;transition:all .2s;font-size:.82rem}
.theme-opt-mobile:hover{background:var(--bg-hover);color:var(--text-primary)}
.theme-opt-mobile .theme-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,.1)}

/* Language switcher */
.lang-switch{display:flex;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border-color);overflow:hidden}
.lang-btn{padding:5px 10px;border:none;background:none;color:var(--text-muted);font-size:.75rem;font-weight:700;cursor:pointer;transition:var(--transition);font-family:inherit}
.lang-btn.active{background:var(--accent-gradient);color:#fff}
.lang-btn:hover:not(.active){color:var(--text-primary)}

/* Layout */
.layout{display:flex;flex-direction:column;min-height:100vh}
.main-content{flex:1;padding-top:80px;padding-bottom:0}
.footer{background:rgba(5,7,13,.95);backdrop-filter:blur(12px);border-top:1px solid rgba(0,212,255,.06);padding:56px 0 32px;margin-top:auto;position:relative}
.footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--accent-gradient);opacity:.15}
.footer-inner{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px}
.footer-brand{display:flex;flex-direction:column;gap:12px}
.footer-logo{display:flex;align-items:center;gap:10px;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#4facfe,#7c3aed,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em}
.footer-logo img{width:40px;height:40px;border-radius:10px}
.footer-desc{color:var(--text-muted);font-size:.85rem;line-height:1.7;max-width:300px}
.footer-col h4{font-size:.8rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px;margin-bottom:18px}
.footer-col-links{display:flex;flex-direction:column;gap:12px}
.footer-col-links span{color:var(--text-muted);font-size:.85rem;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:6px}
.footer-col-links span:hover{color:var(--accent-primary);transform:translateX(4px)}
.footer-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:36px;padding-top:24px;border-top:1px solid rgba(255,255,255,.04)}
.footer-copy{color:var(--text-muted);font-size:.8rem}
.footer-tech{display:flex;gap:12px;flex-wrap:wrap}
.footer-tech-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:20px;font-size:.75rem;color:var(--text-muted);backdrop-filter:blur(8px);transition:var(--transition)}
.footer-tech-badge:hover{border-color:rgba(0,212,255,.2);color:var(--text-secondary)}

/* Card */
.card{background:rgba(12,15,24,.85);border-radius:var(--radius-md);overflow:hidden;transition:all .3s cubic-bezier(.4,0,.2,1);border:1px solid rgba(0,212,255,.1);cursor:pointer;backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.card:hover{transform:translateY(-8px) scale(1.02);border-color:rgba(0,212,255,.25);box-shadow:0 12px 40px rgba(0,212,255,.12),0 0 60px rgba(0,212,255,.06)}
.card:active{transform:translateY(-4px) scale(.98);transition-duration:.1s}
.card-image-wrapper{position:relative;width:100%;padding-top:150%;overflow:hidden;background:var(--bg-secondary)}
.card-music .card-image-wrapper{padding-top:100%}
.card-event .card-image-wrapper{padding-top:65%}
.card-image{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card:hover .card-image{transform:scale(1.05)}
.card-placeholder{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--accent-gradient);font-size:2.5rem;font-weight:800;color:rgba(255,255,255,.5)}
.card-rating{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);backdrop-filter:blur(12px);padding:4px 10px;border-radius:8px;font-size:.8rem;font-weight:700;color:var(--warning);display:flex;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.06)}
.card-fav-badge{position:absolute;top:10px;left:10px;width:30px;height:30px;background:rgba(0,212,255,.85);backdrop-filter:blur(8px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;box-shadow:0 2px 8px rgba(0,212,255,.3)}
.card-body{padding:14px}
.card-title{font-size:.9rem;font-weight:600;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.01em}
.card-subtitle{font-size:.8rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Hero */
.hero{margin-top:-80px;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pulse-cyan),var(--pulse-purple),var(--pulse-pink),transparent);opacity:.4;animation:pulseLineGlow 3s ease-in-out infinite}
@keyframes pulseLineGlow{0%,100%{opacity:.2;filter:blur(0)}50%{opacity:.6;filter:blur(1px)}}
.hero-bg{min-height:560px;background-size:cover;background-position:center;background-color:var(--bg-secondary)}
.hero-overlay{min-height:560px;background:linear-gradient(to right,rgba(5,7,13,.97) 30%,rgba(5,7,13,.3)),linear-gradient(to top,var(--bg-primary) 0%,transparent 25%);display:flex;align-items:center}
.hero-content{padding-top:100px;max-width:620px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.15);border-radius:24px;font-size:.8rem;font-weight:600;color:var(--pulse-cyan);margin-bottom:18px;backdrop-filter:blur(8px);letter-spacing:.02em;box-shadow:0 0 20px rgba(0,212,255,.05)}
.hero-title{font-size:3.2rem;font-weight:800;margin-bottom:16px;line-height:1.08;animation:fadeInUp .6s ease-out both;letter-spacing:-.03em}
.hero-desc{color:var(--text-secondary);font-size:1.05rem;line-height:1.7;margin-bottom:16px;animation:fadeInUp .6s ease-out .1s both}
.hero-meta{display:flex;gap:10px;margin-bottom:24px;animation:fadeInUp .6s ease-out .2s both}
.hero-actions{display:flex;gap:12px;animation:fadeInUp .6s ease-out .3s both}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.section-link{font-size:.875rem;font-weight:600;color:var(--accent-primary);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:4px}
.section-link:hover{color:#33dfff;gap:8px}
.home-section{margin-bottom:56px;position:relative}
.home-section::before{content:'';position:absolute;top:-20px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.12) 20%,rgba(124,58,237,.08) 50%,rgba(0,212,255,.12) 80%,transparent)}
.home-section .carousel .card{width:185px}

/* Music mini cards */
.music-card-mini{display:flex;align-items:center;gap:12px;background:rgba(18,20,30,.6);border-radius:var(--radius-sm);padding:14px 18px;min-width:280px;transition:all .25s cubic-bezier(.4,0,.2,1);border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(8px)}
.music-card-mini:hover{border-color:rgba(255,255,255,.1);background:rgba(255,255,255,.04);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.2)}

/* Home music grid */
.home-music-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.home-music-card{position:relative;border-radius:var(--radius-md);overflow:hidden;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:rgba(18,20,30,.7);border:1px solid rgba(255,255,255,.04)}
.home-music-card:hover{transform:translateY(-6px);border-color:rgba(255,255,255,.1);box-shadow:0 16px 40px rgba(0,0,0,.35),0 0 20px rgba(0,212,255,.04)}
.home-music-cover{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.home-music-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:.3s}
.home-music-card:hover .home-music-overlay{opacity:1}
.home-music-play{width:44px;height:44px;border-radius:50%;background:var(--accent-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;box-shadow:0 4px 16px rgba(0,212,255,.4);transform:scale(.8);transition:.3s}
.home-music-card:hover .home-music-play{transform:scale(1)}
.home-music-info{padding:10px 12px 6px;min-height:48px}
.home-music-title{display:block;font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-music-artist{display:block;font-size:.75rem;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.home-music-dur{position:absolute;top:8px;right:8px;font-size:.7rem;color:#fff;background:rgba(0,0,0,.6);padding:2px 7px;border-radius:6px;backdrop-filter:blur(4px)}
@media(max-width:640px){.home-music-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}}
.music-icon{width:40px;height:40px;border-radius:8px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;color:#fff}
.music-info{display:flex;flex-direction:column;min-width:0;flex:1}
.music-title{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.music-artist{font-size:.8rem;color:var(--text-secondary)}
.music-dur{font-size:.8rem;color:var(--text-muted);margin-left:auto;flex-shrink:0}

/* Event cards home */
.event-card-home{display:flex;gap:16px;padding:18px;background:rgba(18,20,30,.6);border-radius:var(--radius-md);transition:all .25s cubic-bezier(.4,0,.2,1);border:1px solid rgba(255,255,255,.04);cursor:pointer;backdrop-filter:blur(8px)}
.event-card-home:hover{border-color:rgba(255,255,255,.1);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.25)}

/* Event card in carousel */
.card-event .card-body{padding:16px}
.card-event .event-date-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;width:50px;height:50px;border-radius:var(--radius-sm);background:var(--accent-gradient);line-height:1.2}
.card-event .event-day{font-size:1.2rem;font-weight:800;color:#fff;line-height:1}
.card-event .event-month{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.85);text-transform:uppercase}
.event-date-badge{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:54px;border-radius:var(--radius-sm);background:var(--accent-gradient);flex-shrink:0}
.event-day{font-size:1.2rem;font-weight:800;color:#fff;line-height:1}
.event-month{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.8);text-transform:uppercase}

/* Track list */
.track-list{display:flex;flex-direction:column;gap:2px}
.track-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:var(--radius-sm);transition:all .2s;cursor:pointer;position:relative;border:1px solid transparent}
.track-row:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.04)}
.track-playing{background:rgba(0,212,255,.06)!important;border-left:3px solid var(--accent-primary);border-color:rgba(0,212,255,.1)}
.track-num{width:24px;text-align:center;font-size:.82rem;color:var(--text-muted);flex-shrink:0}
.track-cover-sm{width:44px;height:44px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg-secondary)}
.track-cover-sm img{width:100%;height:100%;object-fit:cover}
.track-play-hover{position:absolute;right:14px;opacity:0;transition:.2s;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--accent-gradient);color:#fff;font-size:.85rem;box-shadow:0 2px 12px rgba(0,212,255,.3)}
.track-row:hover .track-play-hover{opacity:1}
.track-info{display:flex;flex-direction:column;min-width:0;flex:1}
.track-title{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-playing .track-title{color:var(--accent-primary)}
.track-artist{font-size:.78rem;color:var(--text-secondary)}
.track-album{font-size:.78rem;color:var(--text-muted);min-width:100px;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-duration{font-size:.8rem;color:var(--text-muted);min-width:36px;text-align:right}

/* Player bar */
.player-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(5,7,13,.97);border-top:1px solid rgba(0,212,255,.1);z-index:101;backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);animation:slideUp .3s ease-out;box-shadow:0 -8px 40px rgba(0,0,0,.5),0 -1px 20px rgba(0,212,255,.06)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.player-progress-top{height:3px;background:rgba(255,255,255,.06);cursor:pointer;position:relative;transition:height .15s}
.player-progress-top:hover{height:5px}
.player-progress-fill{height:100%;background:var(--accent-gradient);border-radius:0 2px 2px 0;transition:width .1s linear;box-shadow:0 0 8px rgba(0,212,255,.3)}
.player-content{display:flex;align-items:center;gap:14px;max-width:1400px;margin:0 auto;padding:10px 24px}
.player-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.player-cover{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.player-info{display:flex;flex-direction:column;min-width:0}
.player-title{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-artist{font-size:.78rem;color:var(--text-secondary)}
.player-center{display:flex;flex-direction:column;align-items:center;gap:2px}
.player-controls{display:flex;align-items:center;gap:6px}
.player-btn{width:36px;height:36px;background:none;border:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s;font-size:1rem}
.player-btn:hover:not(:disabled){color:#fff;background:rgba(255,255,255,.08)}
.player-btn:disabled{opacity:.3;cursor:default}
.player-btn-main{width:46px;height:46px;background:var(--accent-gradient);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;box-shadow:0 2px 12px rgba(0,212,255,.25)}
.player-btn-main:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(0,212,255,.45)}
.player-time{font-size:.7rem;color:var(--text-muted)}
.player-right{display:flex;align-items:center;gap:8px;flex:1;justify-content:flex-end}
.player-volume{-webkit-appearance:none;appearance:none;width:80px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;outline:none;cursor:pointer}
.player-volume::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent-primary);cursor:pointer;box-shadow:0 0 6px rgba(0,212,255,.3)}

@media(max-width:768px){
  .track-album{display:none}
  .player-right{display:none}
  .player-content{padding:8px 16px}
  .player-cover{width:40px;height:40px}
}

/* Events page */
.events-filters{display:flex;gap:16px;margin-bottom:24px}
.filter-group{flex:1;max-width:250px}
.filter-group label{display:block;font-size:.85rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.filter-group select{appearance:none;cursor:pointer}
.event-card{background:rgba(18,20,30,.7);border-radius:var(--radius-md);padding:0;transition:all .3s cubic-bezier(.4,0,.2,1);border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(8px);overflow:hidden}
.event-card:hover{border-color:rgba(255,255,255,.1);transform:translateY(-5px);box-shadow:0 16px 48px rgba(0,0,0,.3),0 0 20px rgba(0,212,255,.04)}
.event-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.event-date-lg{display:flex;flex-direction:column;align-items:center;background:var(--accent-gradient);border-radius:var(--radius-sm);padding:8px 14px;line-height:1.2}
.event-day-lg{font-size:1.5rem;font-weight:800;color:#fff}
.event-month-lg{font-size:.75rem;font-weight:600;color:rgba(255,255,255,.85);text-transform:uppercase}
.event-card-title{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.event-card-desc{font-size:.85rem;color:var(--text-secondary);line-height:1.5;margin-bottom:14px}
.event-meta{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.event-meta-item{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text-secondary)}
.event-card-compact-meta{display:flex;flex-direction:column;gap:5px;margin-top:2px}
.event-card-info-chip{display:flex;align-items:center;gap:6px;min-width:0;padding:4px 7px;border-radius:8px;font-size:.74rem;font-weight:700;line-height:1.25;letter-spacing:.01em}
.event-card-info-chip i{font-size:.9rem;flex:0 0 auto;text-shadow:0 0 10px currentColor}
.event-card-info-text{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.event-card-venue{color:#e7fbff;background:linear-gradient(135deg,rgba(0,212,255,.18),rgba(0,212,255,.07));border:1px solid rgba(0,212,255,.46);box-shadow:0 0 16px rgba(0,212,255,.12)}
.event-card-venue i{color:#22d3ee}
.event-card-price{color:#fff7d6;background:linear-gradient(135deg,rgba(250,204,21,.2),rgba(245,158,11,.08));border:1px solid rgba(250,204,21,.5);box-shadow:0 0 16px rgba(250,204,21,.13)}
.event-card-price i{color:#facc15}
.event-card-rating{color:#fff4c2;background:linear-gradient(135deg,rgba(251,191,36,.18),rgba(245,158,11,.08));border:1px solid rgba(251,191,36,.42);box-shadow:0 0 16px rgba(251,191,36,.1)}
.event-card-rating i{color:#fbbf24}
.event-card-time{color:#dffdf3;background:linear-gradient(135deg,rgba(52,211,153,.16),rgba(16,185,129,.07));border:1px solid rgba(52,211,153,.38);box-shadow:0 0 16px rgba(52,211,153,.1)}
.event-card-time i{color:#34d399}
.event-source-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text-secondary);font-size:.62rem;font-weight:800;line-height:1;text-transform:uppercase;letter-spacing:.02em}
.event-place-cover{aspect-ratio:168/136;background:linear-gradient(135deg,rgba(0,212,255,.12),rgba(124,58,237,.14));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#e8fbff;border-bottom:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
.event-place-cover::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.12),transparent 34%),linear-gradient(120deg,transparent,rgba(255,255,255,.05),transparent);opacity:.9}
.event-place-cover i{position:relative;font-size:2rem;color:var(--accent-primary);filter:drop-shadow(0 0 14px rgba(0,212,255,.35))}
.event-place-cover span{position:relative;font-size:.72rem;font-weight:800;color:var(--text-secondary)}
.event-card-description{font-size:.74rem;color:var(--text-muted);line-height:1.35;margin-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.event-card-genres{display:flex;gap:6px;flex-wrap:wrap}

/* Auth */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 160px);padding:20px}
.auth-card{width:100%;max-width:440px;background:rgba(12,15,24,.85);border-radius:var(--radius-xl);padding:44px;border:1px solid rgba(0,212,255,.08);box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.03);animation:scaleIn .3s ease-out;backdrop-filter:blur(20px);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:60%;height:1px;background:var(--accent-gradient);opacity:.4}
.auth-header{text-align:center;margin-bottom:32px}
.auth-brand{display:inline-flex;align-items:center;gap:10px;margin:0 auto 16px}
.auth-brand .brand-icon{width:38px;height:38px}
.auth-brand .brand-text{font-size:1.2rem}
.auth-header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#4facfe,#7c3aed,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;letter-spacing:-.02em}
.auth-header p{color:var(--text-secondary);font-size:.9rem}
.auth-form{display:flex;flex-direction:column;gap:18px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:.85rem;font-weight:600;color:var(--text-secondary)}
.auth-error{background:rgba(244,63,94,.08);color:var(--error);padding:12px 16px;border-radius:var(--radius-sm);font-size:.85rem;margin-bottom:16px;border:1px solid rgba(244,63,94,.15);animation:fadeIn .2s ease-out;backdrop-filter:blur(8px)}
.auth-switch{text-align:center;margin-top:24px;font-size:.9rem;color:var(--text-secondary)}
.auth-switch a{cursor:pointer}

/* Detail */
.detail-backdrop{position:absolute;top:-80px;left:0;right:0;height:560px;background-size:cover;background-position:center top;z-index:0}
.detail-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(8,9,14,.97) 25%,rgba(8,9,14,.4)),linear-gradient(to top,var(--bg-primary) 5%,transparent)}
.detail-content{position:relative;z-index:1;padding-top:20px}
.detail-layout{display:flex;gap:44px;margin-bottom:48px}
.detail-poster{flex-shrink:0;width:300px}
.detail-poster img{width:100%;border-radius:var(--radius-lg);box-shadow:0 16px 60px rgba(0,0,0,.5),0 0 40px rgba(0,212,255,.06);border:1px solid rgba(255,255,255,.06)}
.detail-poster-ph{width:100%;padding-top:150%;position:relative;border-radius:var(--radius-lg);background:var(--accent-gradient)}
.detail-poster-ph span{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:4rem;font-weight:800;color:rgba(255,255,255,.5)}
.detail-info{flex:1;padding-top:20px}
.detail-title{font-size:2.5rem;font-weight:800;margin-bottom:16px;line-height:1.12;letter-spacing:-.03em}
.detail-meta{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.detail-genres{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.detail-overview{font-size:1rem;line-height:1.8;color:var(--text-secondary);margin-bottom:28px;max-width:700px}
.detail-actions{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.detail-rating{display:flex;align-items:center;gap:10px;font-size:.9rem;color:var(--text-secondary)}
.detail-similar{margin-top:24px}
.detail-similar .carousel .card{width:185px}

/* Trailer */
.trailer-section{margin-top:40px;margin-bottom:40px}
.trailer-container{position:relative;width:100%;max-width:900px;padding-top:50.625%;border-radius:var(--radius-lg);overflow:hidden;background:#000;box-shadow:0 16px 60px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06)}
.trailer-container iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.trailer-thumb{position:relative;width:100%;max-width:900px;aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;background:#000;box-shadow:0 12px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06)}
.trailer-thumb img{width:100%;height:100%;object-fit:cover;transition:all .5s cubic-bezier(.4,0,.2,1)}
.trailer-thumb:hover img{opacity:.5;transform:scale(1.03)}
.trailer-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:76px;height:76px;background:rgba(0,212,255,.85);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;color:#fff;box-shadow:0 6px 36px rgba(0,212,255,.45);transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(4px)}
.trailer-thumb:hover .trailer-play-btn{transform:translate(-50%,-50%) scale(1.15);background:var(--accent-primary);box-shadow:0 8px 44px rgba(0,212,255,.55)}
.trailer-label{position:absolute;bottom:16px;left:16px;display:flex;align-items:center;gap:8px;padding:7px 16px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border-radius:var(--radius-sm);font-size:.85rem;font-weight:600;color:#fff;border:1px solid rgba(255,255,255,.06)}

/* Stars */
.stars{display:inline-flex;gap:2px;cursor:pointer}
.stars.readonly{cursor:default}
.star{color:var(--border-color);transition:color .15s ease,transform .15s ease;font-size:1.4rem}
.star.filled{color:var(--warning)}
.stars:not(.readonly) .star:hover{transform:scale(1.2)}
.stars-lg .star{font-size:1.8rem}

/* Profile */
.profile-header{display:flex;align-items:center;gap:24px;margin-bottom:32px;padding:28px;background:rgba(18,20,30,.7);border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(16px);position:relative;overflow:hidden}
.profile-header::before{content:'';position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle,rgba(0,212,255,.06),transparent 70%);pointer-events:none}
.profile-avatar-lg{width:76px;height:76px;border-radius:50%;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;color:#fff;box-shadow:0 6px 24px rgba(0,212,255,.3);flex-shrink:0}
.profile-email{color:var(--text-secondary);font-size:.9rem}
.profile-joined{color:var(--text-muted);font-size:.8rem;margin-top:2px}
.favorites-group{margin-bottom:32px}
.favorites-list,.ratings-list{display:flex;flex-direction:column;gap:8px}
.fav-item,.rating-item{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(18,20,30,.6);border-radius:var(--radius-sm);transition:var(--transition);border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(8px)}
.fav-item:hover,.rating-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08);transform:translateX(4px)}
.fav-img{width:48px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0}
.fav-img-ph{width:48px;height:64px;border-radius:8px;background:var(--accent-gradient);display:flex;align-items:center;justify-content:center;font-weight:700;color:rgba(255,255,255,.6);flex-shrink:0}
.fav-info{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.fav-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.taste-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}
.stat-card{display:flex;flex-direction:column;align-items:center;padding:28px;background:rgba(18,20,30,.7);border-radius:var(--radius-md);border:1px solid rgba(255,255,255,.05);transition:all .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(8px)}
.stat-card:hover{border-color:rgba(0,212,255,.25);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.25),0 0 20px rgba(0,212,255,.05)}
.stat-number{font-size:2.4rem;font-weight:800;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:.85rem;color:var(--text-secondary);margin-top:4px}
.genre-category{margin-bottom:24px}
.genre-category h3{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--text-secondary);text-transform:capitalize}
.genre-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.genre-bar-label{font-size:.85rem;min-width:120px;text-align:right;color:var(--text-secondary)}
.genre-bar-track{flex:1;height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden}
.genre-bar-fill{height:100%;background:var(--accent-gradient);border-radius:4px;transition:width .8s ease}
.genre-bar-val{font-size:.8rem;color:var(--text-muted);min-width:30px}
.mood-section{margin-bottom:24px}
.mood-section h3{font-size:1rem;font-weight:600;margin-bottom:12px;color:var(--text-secondary)}
.mood-buttons{display:flex;gap:8px;flex-wrap:wrap}
.playlist-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:16px;background:var(--bg-card);border-radius:var(--radius-md);border:1px solid var(--border-color)}
.playlist-header h2{font-size:1.2rem;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* 404 Page */
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;padding:40px}
.not-found-code{font-size:8rem;font-weight:800;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:16px}
.not-found h2{font-size:1.5rem;font-weight:700;margin-bottom:12px}
.not-found p{color:var(--text-secondary);margin-bottom:24px;max-width:400px}

/* Scroll to top */
.scroll-top{position:fixed;bottom:96px;right:32px;width:42px;height:42px;background:rgba(18,20,30,.85);border:1px solid var(--border-color);border-radius:50%;color:var(--text-primary);font-size:1.1rem;cursor:pointer;z-index:90;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:all .3s cubic-bezier(.4,0,.2,1);opacity:0;transform:translateY(20px);pointer-events:none;backdrop-filter:blur(12px)}
.scroll-top.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.scroll-top:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.4);background:rgba(18,20,30,.95);border-color:var(--border-hover)}

/* Counter animation */
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Results counter */
.results-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:12px 18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:var(--radius-sm);backdrop-filter:blur(8px)}
.results-count{font-size:.85rem;color:var(--text-secondary)}
.results-count strong{color:var(--text-primary);font-weight:700}

/* ===== RESPONSIVE DESIGN ===== */

/* Tablet & Large Mobile */
@media(max-width:1280px){
  .container{padding:0 18px}
  .navbar-inner{gap:12px}
  .navbar-links{display:none}
  .mobile-menu-btn{display:flex}
  .navbar-right{gap:6px}
  .navbar-search-form,.navbar-right .conn-indicator,.navbar-right .user-name{display:none}
  .navbar-auth .btn,.navbar-user .btn{padding:6px 10px}
}

@media(max-width:1024px){
  .navbar-right .notif-bell-wrap,.navbar-right .theme-switcher{display:none}
  .lang-btn{padding:5px 8px}
}

@media(max-width:900px){
  .footer-inner{grid-template-columns:1fr 1fr;gap:24px}
}

/* Mobile */
@media(max-width:768px){
  /* Container & Grid */
  .container{padding:0 16px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .grid-lg{grid-template-columns:1fr}
  
  /* Navbar */
  .navbar-links{display:none}
  .mobile-menu-btn{display:flex}
  .navbar-right .conn-indicator,
  .navbar-right .user-name,
  .navbar-right .notif-bell-wrap,
  .navbar-right .theme-switcher,
  .navbar-right .lang-switch{display:none}
  .navbar-user .nav-link-icon{display:none}
  .navbar-right{gap:6px}
  .navbar-auth .btn{padding:7px 10px;font-size:.78rem}
  .navbar-user .btn{padding:6px 8px;font-size:0}
  .navbar-auth .btn i,.navbar-user .btn i{font-size:.9rem}
  .search-input{display:none}
  
  /* Mobile Menu */
  .mobile-menu{max-height:calc(100vh - 64px);overflow-y:auto}
  
  /* Hero Section */
  .hero-title{font-size:2rem}
  .hero-content{padding-top:80px}
  .hero-bg,.hero-overlay{min-height:440px}
  
  /* Detail Pages */
  .detail-layout{flex-direction:column;gap:24px}
  .detail-poster{width:200px;margin:0 auto}
  .detail-title{font-size:1.6rem}
  
  /* Profile */
  .profile-header{flex-direction:column;text-align:center;gap:16px;padding:20px}
  .taste-stats{grid-template-columns:1fr}
  
  /* Events & Filters */
  .events-filters{flex-direction:column}
  .track-album,.track-genres{display:none}
  
  /* Footer */
  .footer-inner{grid-template-columns:1fr;gap:24px;text-align:center}
  .footer-desc{margin:0 auto}
  .footer-bottom{flex-direction:column;gap:12px}
  .footer-tech{justify-content:center}
  
  /* Player Bar */
  .player-content{flex-wrap:wrap;gap:10px}
  .progress-wrap{order:3;max-width:100%;flex-basis:100%}
  
  /* Tabs */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;gap:2px;padding-bottom:4px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{white-space:nowrap;flex-shrink:0;padding:10px 14px;font-size:.8rem}
  
  /* Notifications & Theme Dropdowns */
  .notif-dropdown{width:calc(100vw - 32px);right:-60px;max-height:360px}
  .theme-dropdown{right:-20px}
  
  /* 404 Page */
  .not-found-code{font-size:5rem}
  
  /* Trailer */
  .trailer-container{padding-top:56.25%}
  
  /* AI Assistant */
  .fab-ai-tooltip{right:10px;max-width:180px;font-size:.8rem;bottom:94px}
  .ai-input-dock{padding:10px 12px}
  
  /* Admin Panel */
  .admin-table{display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .admin-form-row{flex-direction:column}
  .admin-grid{grid-template-columns:repeat(2,1fr);gap:10px}
  
  /* Auth Pages */
  .auth-card{padding:28px 20px}
  
  /* Carousel Arrows - Hide on Mobile */
  .carousel-arrow{display:none}
}

/* Small Mobile */
@media(max-width:480px){
  /* Grid & Cards */
  .grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .home-section .carousel .card{width:150px}
  .home-section{margin-bottom:32px}
  .section-title{font-size:1.2rem}
  
  /* Typography */
  .hero-title{font-size:1.6rem}
  .hero-desc{font-size:.95rem}
  .page-header h1{font-size:1.5rem}
  .page-header p{font-size:.9rem}
  .detail-title{font-size:1.3rem}
  
  /* Navbar - Hide Text Labels */
  .navbar-right .btn span,.navbar-auth .btn span{display:none}
  .navbar-auth .btn-primary{display:none}
  
  /* Carousel spacing */
  .carousel{padding-bottom:12px}
  
  /* Auth Pages */
  .auth-page{padding:12px}
  .auth-card{padding:22px 14px;border-radius:20px}
  .auth-header h1{font-size:1.55rem}
  .auth-header p{font-size:.85rem}
  .auth-brand{gap:8px}
  .auth-brand .brand-icon{width:34px;height:34px}
  .auth-brand .brand-text{font-size:1.05rem}
  .auth-form{gap:14px}
  
  /* Admin Panel */
  .admin-grid{grid-template-columns:1fr 1fr}
  .admin-stat{padding:16px}
  .admin-stat .stat-number{font-size:1.3rem}
  
  /* Floating Buttons */
  .notif-dropdown{right:-100px}
  .fab-ai{width:50px;height:50px;font-size:1.2rem;bottom:22px;right:20px}
  .scroll-top{bottom:82px;right:24px;width:38px;height:38px}
  .pwa-install-banner{flex-direction:column;gap:10px;padding:14px;font-size:.85rem}
  
  /* Music page */
  .music-icon{width:36px;height:36px;font-size:1.1rem}
  
  /* Event cards */
  .event-card-home{padding:14px}
  .event-date-badge{width:48px;height:48px}
  .event-day{font-size:1.1rem}
  .event-month{font-size:.65rem}
}

/* ===== THEMES ===== */
body.theme-light{
  --bg-primary:#faf9f7;
  --bg-secondary:#ffffff;
  --bg-tertiary:#f5f4f2;
  --bg-card:#ffffff;
  --bg-card-solid:#ffffff;
  --bg-hover:#f5f4f2;
  --bg-input:#faf9f7;
  --bg-glass:rgba(255,255,255,.9);
  --text-primary:#1a1a1a;
  --text-secondary:#4a4a4a;
  --text-muted:#6b6b6b;
  --accent-primary:#2563eb;
  --accent-secondary:#7c3aed;
  --accent:#2563eb;
  --accent-gradient:linear-gradient(135deg,#2563eb,#7c3aed,#a855f7);
  --accent-glow:rgba(37,99,235,.1);
  --border-color:rgba(0,0,0,.08);
  --border-hover:rgba(37,99,235,.3);
  --border:rgba(0,0,0,.1);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.1),0 12px 40px rgba(0,0,0,.06);
  --shadow-glow:0 0 30px rgba(37,99,235,.08);
}
body.theme-light::before{background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(37,99,235,.03),transparent),radial-gradient(ellipse 50% 40% at 85% 100%,rgba(124,58,237,.02),transparent)}
body.theme-light::after{opacity:.25}
body.theme-light .navbar{background:rgba(255,255,255,.95);border-bottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 3px rgba(0,0,0,.04)}
body.theme-light .navbar.scrolled{background:rgba(255,255,255,.98);box-shadow:0 4px 20px rgba(0,0,0,.08)}
body.theme-light .mobile-menu{background:rgba(255,255,255,.98);border-bottom:1px solid rgba(0,0,0,.08);box-shadow:0 16px 40px rgba(0,0,0,.08)}
body.theme-light .theme-switcher-mobile .btn{background:rgba(0,0,0,.04);color:var(--text-primary);border-color:var(--border-color)}
body.theme-light .theme-grid-mobile{background:#f5f4f2;border-color:rgba(0,0,0,.08)}
body.theme-light .theme-opt-mobile{background:#ffffff;border-color:rgba(0,0,0,.08);color:var(--text-secondary)}
body.theme-light .theme-opt-mobile:hover{background:rgba(37,99,235,.06);color:var(--accent-primary)}
body.theme-light .bottom-nav{background:rgba(255,255,255,.98);border-top:1px solid rgba(0,0,0,.08);box-shadow:0 -2px 10px rgba(0,0,0,.04)}
body.theme-light .footer{background:#f5f4f2;border-top:1px solid rgba(0,0,0,.08)}
body.theme-light .card{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.04)}
body.theme-light .card:hover{box-shadow:0 8px 24px rgba(37,99,235,.1),0 0 40px rgba(37,99,235,.05)}
body.theme-light .auth-card{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 4px 24px rgba(0,0,0,.08)}
body.theme-light .theme-dropdown{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 10px 30px rgba(0,0,0,.1)}
body.theme-light .theme-opt:hover{background:rgba(37,99,235,.06)}
body.theme-light .notif-dropdown{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 12px 34px rgba(0,0,0,.1)}
body.theme-light .pwa-install-banner{background:#ffffff;border-color:rgba(0,0,0,.08);box-shadow:0 10px 26px rgba(0,0,0,.08)}
body.theme-light .player-bar{background:rgba(255,255,255,.98);border-top:1px solid rgba(0,0,0,.08)}
body.theme-light .skip-link{color:#fff}
body.theme-light a:hover{color:#2563eb}
body.theme-light ::-webkit-scrollbar-thumb{background:rgba(26,32,44,.2)}
body.theme-light ::-webkit-scrollbar-thumb:hover{background:rgba(59,130,246,.4)}
body.theme-light ::selection{background:rgba(59,130,246,.2);color:#1a202c}
body.theme-light .btn-secondary{background:rgba(26,32,44,.04);color:var(--text-primary);border-color:var(--border-color)}
body.theme-light .btn-secondary:hover{background:rgba(26,32,44,.06)}
body.theme-light .btn-back{background:rgba(26,32,44,.04)}
body.theme-light .btn-back:hover{background:rgba(26,32,44,.06)}
body.theme-light .input{background:rgba(26,32,44,.04)}
body.theme-light .input:focus{background:rgba(26,32,44,.05)}
body.theme-light .badge{border-color:rgba(26,32,44,.08)}
body.theme-light .badge-accent{background:rgba(59,130,246,.08)}
body.theme-light .spinner{border-color:rgba(26,32,44,.08)}
body.theme-light .tabs{background:rgba(26,32,44,.03)}
body.theme-light .tab:hover{background:rgba(26,32,44,.05)}
body.theme-light .btn-ripple::after{background-image:radial-gradient(circle,rgba(26,32,44,.15) 10%,transparent 10%)}
body.theme-light .card{background:rgba(245,247,250,.88)}
body.theme-light .card:hover{box-shadow:0 8px 40px rgba(26,32,44,.08),var(--shadow-lg)}
body.theme-light .card-overlay-icon{background:rgba(59,130,246,.85);color:#fff}
body.theme-light .stat-card::before{background:radial-gradient(circle,rgba(59,130,246,.04) 0%,transparent 70%)}
body.theme-light .toast-success .toast-icon-wrap{background:rgba(16,185,129,.1)}
body.theme-light .toast-error .toast-icon-wrap{background:rgba(239,68,68,.1)}
body.theme-light .toast-info .toast-icon-wrap{background:rgba(99,102,241,.1)}
body.theme-light .toast-success{background:rgba(245,247,250,.98)}
body.theme-light .toast-error{background:rgba(245,247,250,.98)}
body.theme-light .toast-info{background:rgba(245,247,250,.98)}
body.theme-light .navbar{background:rgba(245,247,250,.92)}
body.theme-light .navbar.scrolled{background:rgba(245,247,250,.97);box-shadow:0 4px 40px rgba(26,32,44,.08)}
body.theme-light .brand-icon{color:#1a202c}
body.theme-light .nav-link:hover{background:rgba(59,130,246,.05)}
